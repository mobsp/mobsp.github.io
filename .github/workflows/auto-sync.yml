# CI/CD: AUTOMATED REPOSITORY INDEXING SERVICE
name: Mobispace-Asset-Sync-CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  inventory-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Initialize Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Execute RAI Scanner
        run: python sync_scanner.py

      - name: Synchronize State to Remote
        run: |
          git config --local user.email "bot@mobsp.io"
          git config --local user.name "System-Auto-Indexer"
          git add .
          if git diff --staged --quiet; then
            echo "State synchronized. No commit required."
          else
            git commit -m "chore(sync): global re-indexing of repository assets"
            git push
          fi
