name: Ⲙ𝔬ⲃⳝ𝔭 README Auto-Sync

# 觸發條件：當你 push 代碼到 main 分支時，或手動執行時
on:
  push:
    branches: [ main ]
    paths:
      - '**/*.html'   # 只有當 HTML 檔案變動時才觸發，省資源
  workflow_dispatch:  # 允許你在 GitHub Actions 頁面手動點擊執行

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 賦予腳本寫入 README 並回傳儲存庫的權限

    steps:
      - name: 📥 下載儲存庫代碼
        uses: actions/checkout@v3

      - name: 🐍 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: ⚙️ 執行矩陣同步腳本
        run: python .github/scripts/sync.py

      - name: 📤 自動提交並回傳 GitHub
        run: |
          git config --global user.name "MobspMatrixBot"
          git config --global user.email "bot@mobsp.qzz.io"
          git add README.md
          # 檢查是否有變動，有變動才提交
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: ⚡ 自動更新資產矩陣索引" && git push)
