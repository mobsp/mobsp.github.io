<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ⲙ𝔬ⲃ¡ⳝ𝔭ⲁ𝔠ⲉ | 莫比部落格</title>
    
    <link rel="icon" href="https://mobsp.github.io/assets/brand/ms-logo1.webp" type="image/jpeg">
    <link rel="apple-touch-icon" href="https://mobsp.github.io/assets/brand/ms-logo1.webp">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-body: #000000; --bg-container: #111111;
            --text-main: #ffffff; --text-sub: #aaaaaa;
            --accent-color: #00cec9; --nav-bg: #111111;
            --border-color: #262626;
            --transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg-body); 
            height: 100dvh; overflow: hidden; 
        }

        #ms-splash {
            position: fixed; inset: 0;
            background: #000 url('https://mobsp.github.io/assets/brand/ms-blog.webp') center/cover no-repeat;
            z-index: 10000; display: flex; align-items: center; justify-content: center;
            transition: opacity 0.8s ease;
        }
        #ms-splash.hide { opacity: 0; pointer-events: none; }
        
        #app-container { 
            max-width: 480px; margin: 0 auto; 
            background-color: var(--bg-container); 
            height: 100%; display: flex; flex-direction: column; 
            opacity: 0; transform: scale(1.01); transition: opacity 0.6s ease, transform 0.6s ease;
        }
        body.loaded #app-container { opacity: 1; transform: scale(1); }

        .app-header { 
            flex-shrink: 0;
            padding: calc(15px + env(safe-area-inset-top)) 15px 10px; 
            background: var(--nav-bg); border-bottom: 1px solid var(--border-color);
            display: flex; flex-direction: column; align-items: center;
        }

        .marquee-row {
            display: flex; align-items: center; background: rgba(255,255,255,0.05);
            padding: 6px 12px; border-radius: 10px; margin-bottom: 12px; overflow: hidden;
            min-height: 28px; width: 100%;
        }
        .v-tag { background: var(--accent-color); color: #000; font-size: 9px; font-weight: 900; padding: 2px 6px; border-radius: 4px; margin-right: 10px; }
        .mq-box { flex: 1; overflow: hidden; white-space: nowrap; }
        .mq-text { display: inline-block; padding-left: 100%; animation: mq 25s linear infinite; font-size: 11px; color: #fff; }
        @keyframes mq { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        /* 修正：右上角傳送門按鈕 */
        .portal-link {
            background: var(--accent-color); color: #000; border-radius: 50%;
            width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
            text-decoration: none; font-size: 14px; transition: 0.3s; margin-left: 10px;
        }
        .portal-link:active { transform: scale(0.9); }

        /* 新增：類別切換條樣式 */
        .filter-scroll {
            display: flex; gap: 10px; padding: 10px 15px; overflow-x: auto;
            scrollbar-width: none; background: #000; border-bottom: 1px solid var(--border-color);
        }
        .filter-scroll::-webkit-scrollbar { display: none; }
        .filter-btn {
            flex: 0 0 auto; padding: 6px 15px; border-radius: 20px;
            background: #1a1a1a; border: 1px solid var(--border-color);
            color: #888; font-size: 11px; cursor: pointer; transition: 0.3s;
        }
        .filter-btn.active { background: var(--accent-color); color: #000; border-color: var(--accent-color); font-weight: bold; }

        .brand-title-link { display: block; width: 100%; margin-bottom: 5px; }
        .brand-title-img { width: 100%; height: auto; border-radius: 8px; }

        #main-view { flex: 1; overflow-y: auto; background: #000; }
        .section-label { padding: 15px 15px 5px; font-weight: bold; font-size: 14px; color: #fff; opacity: 0.6; }
        
        .article-row { display: flex; gap: 12px; padding: 12px 15px; border-bottom: 1px solid var(--border-color); align-items: center; text-decoration: none; }
        .row-img { width: 65px; height: 65px; border-radius: 10px; object-fit: cover; background: #222; }
        .row-info { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .row-title { font-size: 14px; font-weight: 500; color: #eee; }
        .row-cate { font-size: 9px; color: var(--accent-color); text-transform: uppercase; letter-spacing: 1px; }

        .bottom-nav { 
            height: calc(60px + env(safe-area-inset-bottom)); 
            background-color: var(--nav-bg); border-top: 1px solid var(--border-color); 
            display: flex; justify-content: space-around; align-items: center; 
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-sub); text-decoration: none; font-size: 10px; gap: 4px; }
        .nav-item.active { color: var(--accent-color); }
    </style>
</head>
<body>

    <div id="ms-splash"></div>

    <div id="app-container">
        <header class="app-header">
            <nav class="marquee-row">
                <span class="v-tag" id="v-tag">SYNC</span>
                <div class="mq-box"><div class="mq-text" id="mq-text">歡迎來到 Ⲙ𝔬ⲃ¡ⳝ𝔭ⲁ𝔠ⲉ！系統連線中...</div></div>
                <a href="https://mobsp.qzz.io/tol/publisher/" class="portal-link" title="前往發佈器">
                    <i class="fa-solid fa-paper-plane"></i>
                </a>
            </nav>

            <a href="https://mobsp.github.io/blog/" class="brand-title-link">
                <img src="https://mobsp.github.io/assets/brand/ms-blog-title.webp" alt="莫比部落格" class="brand-title-img">
            </a>
        </header>

        <div class="filter-scroll">
            <button class="filter-btn active" onclick="filterData('全部', this)">全部</button>
            <button class="filter-btn" onclick="filterData('教程', this)">教程</button>
            <button class="filter-btn" onclick="filterData('開發', this)">開發</button>
            <button class="filter-btn" onclick="filterData('其它', this)">其它</button>
            <button class="filter-btn" onclick="filterData('🔞', this)">🔞</button>
        </div>

        <main id="main-view">
            <div id="github-articles">
                <p style="color:#444; text-align:center; padding:50px; font-size:12px;">正在同步儲存庫檔案...</p>
            </div>
        </main>

        <nav class="bottom-nav">
            <a href="https://mobsp.github.io/music/" class="nav-item"><i class="fa-solid fa-music"></i><span>音樂</span></a>
            <a href="https://mobsp.github.io/shorts/" class="nav-item"><i class="fa-brands fa-youtube"></i><span>Shorts</span></a>
            <a href="https://mobsp.github.io/wiki/" class="nav-item"><i class="fa-solid fa-circle-info"></i><span>支援中心</span></a>
            <a href="https://mobsp.github.io/setting" class="nav-item"><i class="fa-solid fa-gear"></i><span>設定</span></a>
        </nav>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        let rawArticles = []; // 儲存原始抓取的文章數據

        (function() {
            const splash = document.getElementById('ms-splash');
            function hideSplash() {
                splash.classList.add('hide');
                document.body.classList.add('loaded');
                setTimeout(() => splash.remove(), 1000);
            }

            // 1. 抓取文章並解析類別
            async function loadGithubArticles() {
                const container = document.getElementById('github-articles');
                const api_url = "https://api.github.com/repos/mobsp/mobsp.github.io/contents/blog/p/list";
                
                try {
                    const response = await fetch(api_url);
                    const files = await response.json();
                    
                    rawArticles = files.filter(f => f.name.endsWith('.html')).reverse().map(file => {
                        const name = file.name;
                        // 自動解析檔名中的類別標籤
                        let cate = "其它";
                        if (name.includes("教程") || name.includes("[教程]")) cate = "教程";
                        else if (name.includes("開發") || name.includes("[開發]")) cate = "開發";
                        else if (name.includes("🔞")) cate = "🔞";

                        return {
                            name: name,
                            title: decodeURIComponent(name.replace('.html', '').replace(/\[.*?\]-?/g, '')),
                            cate: cate,
                            path: file.path
                        };
                    });

                    renderList(rawArticles);
                } catch (err) {
                    container.innerHTML = '<p style="color:red; text-align:center; padding:20px;">API 載入失敗</p>';
                }
            }

            // 2. 渲染列表
            window.renderList = function(items) {
                const container = document.getElementById('github-articles');
                if (items.length === 0) {
                    container.innerHTML = '<p style="color:#444; text-align:center; padding:50px;">此分類尚無內容</p>';
                    return;
                }
                container.innerHTML = items.map(post => `
                    <a class="article-row" href="https://mobsp.github.io/${post.path}">
                        <img src="https://mobsp.github.io/assets/brand/ms-post.webp" class="row-img">
                        <div class="row-info">
                            <div class="row-cate">${post.cate}</div>
                            <div class="row-title">${post.title}</div>
                            <div style="font-size: 10px; color: #444;">Ⲙ𝔬ⲃ¡ⳝ𝔭ⲁ𝔠ⲉ Archive</div>
                        </div>
                        <i class="fa-solid fa-chevron-right" style="color:#222; font-size:10px;"></i>
                    </a>
                `).join('');
            };

            // 3. 過濾功能
            window.filterData = function(cate, btn) {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                if (cate === '全部') {
                    renderList(rawArticles);
                } else {
                    const filtered = rawArticles.filter(a => a.cate === cate);
                    renderList(filtered);
                }
            };

            window.addEventListener('load', () => {
                loadGithubArticles();
                setTimeout(hideSplash, 1200);
            });
        })();
    </script>
</body>
</html>
