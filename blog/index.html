<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ⲙ𝔬ⲃ¡ⳝ𝔭ⲁ𝔠ⲉ Terminal | v5.5 Cloud Sync</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --accent: #00cec9; --bg: #000; --container: #0a0a0a;
            --text: #e0e0e0; --sub: #666; --border: #222;
            --font-main: -apple-system, sans-serif; --fs-base: 14px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: var(--font-main); font-size: var(--fs-base);
            height: 100dvh; overflow: hidden; position: fixed; width: 100%;
        }

        #bg-canvas { position: fixed; inset: 0; z-index: -1; opacity: 0.3; pointer-events: none; }
        
        #app { 
            max-width: 500px; margin: 0 auto; height: 100dvh; 
            display: flex; flex-direction: column; background: var(--container);
            border-left: 1px solid var(--border); border-right: 1px solid var(--border);
            position: relative;
        }

        header { padding: calc(45px + env(safe-area-inset-top)) 15px 10px; border-bottom: 1px solid var(--border); }
        .view { flex: 1; overflow-y: auto; padding: 20px 20px 120px; display: none; }
        .view.active { display: block; }

        /* 表單與 UI 組件 */
        .field { margin-bottom: 20px; }
        label { display: block; font-size: 11px; color: var(--sub); margin-bottom: 8px; text-transform: uppercase; }
        input, textarea, select { 
            width: 100%; background: #111; border: 1px solid var(--border); 
            color: #fff; padding: 12px; border-radius: 8px; font-size: 14px;
        }
        
        .btn { border: none; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: bold; }
        .btn-primary { background: var(--accent); color: #000; padding: 15px; width: 100%; margin-top: 10px; }
        .btn-ghost { background: #1a1a1a; color: #ccc; padding: 8px 12px; font-size: 11px; border: 1px solid var(--border); }
        
        /* 檔案卡片 (II-8/11) */
        .file-card { 
            background: #080808; border: 1px solid var(--border); padding: 15px; 
            border-radius: 10px; margin-bottom: 12px; transition: 0.3s;
        }
        .file-card:active { border-color: var(--accent); }

        nav { 
            position: absolute; bottom: 0; width: 100%; 
            height: calc(70px + env(safe-area-inset-bottom));
            background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(10px);
            border-top: 1px solid var(--border); display: flex; 
            padding-bottom: env(safe-area-inset-bottom); z-index: 100;
        }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--sub); font-size: 10px; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }

        #toast { 
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%) translateY(-100px); 
            background: #111; border: 1px solid var(--accent); padding: 12px 20px; 
            border-radius: 30px; z-index: 3000; transition: 0.4s; opacity: 0; font-size: 12px;
        }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* 伸縮面板 */
        details { border: 1px solid var(--border); border-radius: 8px; margin-bottom: 15px; }
        summary { padding: 12px; font-size: 12px; color: var(--accent); cursor: pointer; list-style: none; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div id="toast"></div>

    <div id="app">
        <header>
            <div style="font-size: 11px; color: var(--accent); font-weight: bold;">Ⲙ𝔬ⲃ¡ⳝ𝔭ⲁ𝔠ⲉ AUTHORITY V5.5</div>
            <div id="sync-status" style="font-size: 9px; color: #444;">[系統狀態] 雲端同步就緒 (II-11/12)</div>
        </header>

        <div id="main-stage">
            <div id="view-pub" class="view active">
                <div class="field">
                    <label>GitHub Token (IV-12 監控中)</label>
                    <input type="password" id="token" placeholder="ghp_xxxxxxxx">
                </div>
                <div class="field">
                    <label>標題 (VI-1 AI支援)</label>
                    <div style="display:flex; gap:8px;">
                        <input type="text" id="title" placeholder="文章標題">
                        <button class="btn btn-ghost" onclick="localAI('title')">AI產標</button>
                    </div>
                </div>
                <div class="field">
                    <label>內容 (I-1 Markdown)</label>
                    <div style="display:flex; gap:8px; margin-bottom:8px;">
                        <button class="btn btn-ghost" onclick="document.getElementById('upload').click()">手機照片</button>
                        <button class="btn btn-ghost" onclick="localAI('img')">AI配圖</button>
                    </div>
                    <textarea id="content" rows="12" placeholder="內容..."></textarea>
                    <input type="file" id="upload" hidden accept="image/*">
                </div>

                <details>
                    <summary>進階發佈擴充 (III / IV / VI)</summary>
                    <div style="padding: 15px; background: #080808;">
                        <div class="field">
                            <label>文章分類路徑 (二-1/6)</label>
                            <input type="text" id="cate-path" value="blog/p/list" placeholder="例如: tech/notes">
                        </div>
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; font-size:11px;">
                            <label><input type="checkbox" id="up-sitemap" checked> 更新 Sitemap (III-7)</label>
                            <label><input type="checkbox" id="add-disclaim" checked> 免責聲明 (IV-14)</label>
                        </div>
                    </div>
                </details>

                <button class="btn btn-primary" onclick="publish()">執行雲端發佈 (II-19 查重)</button>
            </div>

            <div id="view-files" class="view">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <h4 style="color:var(--accent); margin:0;">文件宇宙 / blog/p/list</h4>
                    <button class="btn btn-ghost" onclick="syncRepo()"><i class="fa-solid fa-rotate"></i> 同步雲端</button>
                </div>
                <div class="field">
                    <input type="text" id="search" oninput="searchFiles(this.value)" placeholder="全站搜尋 (二-8)...">
                </div>
                
                <div id="file-list" style="min-height:200px;">
                    <p style="text-align:center; color:#444; margin-top:50px;">點擊「同步雲端」讀取文章列表</p>
                </div>

                <div style="margin-top:20px; border-top:1px solid var(--border); padding-top:15px;">
                    <label>二-12 MOD 模組封裝</label>
                    <button class="btn btn-ghost" style="width:100%" onclick="exportMOD()">
                        <i class="fa-solid fa-file-code"></i> 匯出 Articles.json MOD
                    </button>
                </div>
            </div>

            <div id="view-set" class="view">
                <h4 style="color:var(--accent)">系統與樣式</h4>
                <div class="field">
                    <label>Proton級密碼產生器 (IV-15)</label>
                    <div style="display:flex; gap:8px;">
                        <input type="text" id="pw-out" readonly>
                        <button class="btn btn-ghost" onclick="genSecurePw()">產生</button>
                    </div>
                </div>
                <div class="field">
                    <label>介面 Hue 調整 (V-14)</label>
                    <input type="range" min="0" max="360" value="180" oninput="updateHue(this.value)">
                </div>
                <button class="btn btn-ghost" style="width:100%; color:#ff4d4d;" onclick="localStorage.clear();location.reload();">重置所有資料</button>
            </div>
        </div>

        <nav>
            <div class="nav-item active" onclick="go(0, this)"><i class="fa-solid fa-paper-plane"></i><span>發佈</span></div>
            <div class="nav-item" onclick="go(1, this)"><i class="fa-solid fa-folder-tree"></i><span>文件</span></div>
            <div class="nav-item" onclick="go(2, this)"><i class="fa-solid fa-sliders"></i><span>設定</span></div>
        </nav>
    </div>

    <script>
        let state = { articles: [], hue: 180 };

        // --- 1. 初始化與同步 (核心修正) ---
        window.onload = () => {
            const saved = JSON.parse(localStorage.getItem('mob_v55') || '{}');
            if(saved.token) document.getElementById('token').value = saved.token;
            if(saved.hue) updateHue(saved.hue);
            initBg();
        };

        function go(idx, el) {
            document.querySelectorAll('.view').forEach((v,i) => v.classList.toggle('active', i===idx));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        async function syncRepo() {
            const token = document.getElementById('token').value;
            const list = document.getElementById('file-list');
            if(!token) return msg("請輸入 Token", true);

            list.innerHTML = `<p style="text-align:center; color:var(--accent);">同步中...</p>`;
            
            try {
                // 直接向 GitHub API 請求 blog/p/list 路徑 (二-11)
                const res = await fetch(`https://api.github.com/repos/mobsp/mobsp.github.io/contents/blog/p/list`, {
                    headers: { "Authorization": `token ${token}` }
                });
                if(!res.ok) throw new Error("路徑讀取失敗");
                
                const data = await res.json();
                state.articles = data.filter(f => f.name.endsWith('.html'));
                
                renderFiles(state.articles);
                msg(`已同步 ${state.articles.length} 篇文章`);
            } catch(e) {
                list.innerHTML = `<p style="text-align:center; color:red;">同步失敗: ${e.message}</p>`;
            }
        }

        function renderFiles(files) {
            const list = document.getElementById('file-list');
            list.innerHTML = files.map(f => `
                <div class="file-card">
                    <div style="display:flex; justify-content:space-between;">
                        <b style="color:var(--accent); font-size:13px;">${f.name}</b>
                        <span style="font-size:9px; color:#444;">HTML</span>
                    </div>
                    <div style="font-size:10px; color:#555; margin:5px 0;">SHA: ${f.sha.substring(0,10)}</div>
                    <div style="display:flex; gap:8px; margin-top:8px;">
                        <button class="btn btn-ghost" onclick="window.open('https://mobsp.github.io/${f.path}')">預覽</button>
                        <button class="btn btn-ghost" style="color:red" onclick="delFile('${f.path}','${f.sha}')">刪除</button>
                    </div>
                </div>
            `).join('');
        }

        // --- 2. 發佈與 MOD 封裝 (二-12/19) ---
        async function publish() {
            const token = document.getElementById('token').value;
            const title = document.getElementById('title').value;
            let content = document.getElementById('content').value;
            const pathBase = document.getElementById('cate-path').value;

            if(!token || !title) return msg("標題與 Token 必填", true);

            // 二-19: 相似度偵測 (簡易模擬)
            if(state.articles.some(a => a.name.includes(title))) {
                if(!confirm("偵測到相似標題文章，確定重複發佈嗎？")) return;
            }

            if(document.getElementById('add-disclaim').checked) {
                content += `\n\n---\n> 免責聲明: 本文由 Ⲙ𝔬ⲃ¡ⳝ𝔭ⲁⲉ 終端機發佈。`;
            }

            const fileName = `${new Date().toISOString().split('T')[0]}-${title}.html`;
            const fullPath = `${pathBase}/${fileName}`;
            const html = `<!DOCTYPE html><html><head><title>${title}</title></head><body>${marked.parse(content)}</body></html>`;

            try {
                const res = await fetch(`https://api.github.com/repos/mobsp/mobsp.github.io/contents/${fullPath}`, {
                    method: "PUT",
                    headers: { "Authorization": `token ${token}` },
                    body: JSON.stringify({
                        message: `Pub: ${title}`,
                        content: btoa(unescape(encodeURIComponent(html)))
                    })
                });
                if(res.ok) {
                    msg("發佈成功！");
                    syncRepo(); // 自動更新列表
                }
            } catch(e) { msg("發佈出錯", true); }
        }

        function exportMOD() {
            // 二-12: 封裝成 articles.json 模組
            const mod = {
                generator: "Ⲙ𝔬ⲃ¡ⳝ𝔭ⲁⲉ V5.5",
                updated: new Date().toISOString(),
                list: state.articles.map(a => ({ name: a.name, path: a.path, url: `https://mobsp.github.io/${a.path}` }))
            };
            const blob = new Blob([JSON.stringify(mod, null, 2)], {type:'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'articles-mod.json';
            a.click();
            msg("MOD 模組已下載");
        }

        // --- 3. 工具類 (IV-15, V-14, VI) ---
        function genSecurePw() {
            const c = "ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz23456789!@#$%^&*";
            let r = "";
            const v = new Uint32Array(16);
            window.crypto.getRandomValues(v);
            for(let i=0; i<16; i++) r += c[v[i] % c.length];
            document.getElementById('pw-out').value = r;
        }

        function localAI(type) {
            const c = document.getElementById('content').value;
            if(type === 'title') {
                document.getElementById('title').value = `解析：${c.substring(0,10)}...`;
            } else {
                const url = `https://picsum.photos/seed/${Math.random()}/800/400`;
                document.getElementById('content').value += `\n![AI封面](${url})\n`;
            }
            msg("AI 運算完成");
        }

        function msg(m, err=false) {
            const t = document.getElementById('toast');
            t.innerText = m; t.style.borderColor = err ? 'red' : 'var(--accent)';
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function updateHue(v) {
            state.hue = v;
            document.documentElement.style.setProperty('--accent', `hsl(${v}, 100%, 40%)`);
            localStorage.setItem('mob_v55', JSON.stringify({token: document.getElementById('token').value, hue: v}));
        }

        function initBg() {
            const cvs = document.getElementById('bg-canvas');
            const ctx = cvs.getContext('2d');
            let w = cvs.width = window.innerWidth;
            let h = cvs.height = window.innerHeight;
            function draw() {
                ctx.fillStyle = "rgba(0,0,0,0.1)";
                ctx.fillRect(0,0,w,h);
                ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent');
                for(let i=0; i<20; i++) ctx.fillRect(Math.random()*w, Math.random()*h, 1, 10);
                requestAnimationFrame(draw);
            }
            draw();
        }
    </script>
</body>
</html>
