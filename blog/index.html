<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ⲙ𝔬ⲃ¡ⳝ𝔭ⲁ𝔠ⲉ | 莫比部落格</title>
    
    <link rel="icon" href="https://mobsp.github.io/assets/brand/ms-logo1.webp" type="image/jpeg">
    <link rel="apple-touch-icon" href="https://mobsp.github.io/assets/brand/ms-logo1.webp">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-body: #000000; --bg-container: #111111;
            --text-main: #ffffff; --text-sub: #aaaaaa;
            --accent-color: #00cec9; --nav-bg: #111111;
            --border-color: #262626;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-body); height: 100dvh; overflow: hidden; }

        /* 啟動畫面 */
        #ms-splash { position: fixed; inset: 0; background: #000 url('https://mobsp.github.io/assets/brand/ms-blog.webp') center/cover no-repeat; z-index: 100000; display: flex; align-items: center; justify-content: center; transition: opacity 0.6s ease-out; }
        #ms-splash::after { content: ""; width: 28px; height: 28px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--accent-color); border-radius: 50%; animation: spin 0.8s linear infinite; position: absolute; bottom: 20%; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #ms-splash.hide { opacity: 0; pointer-events: none; }
        
        #app-container { max-width: 480px; margin: 0 auto; background-color: var(--bg-container); height: 100%; display: flex; flex-direction: column; opacity: 0; transition: opacity 0.5s ease; }
        body.loaded #app-container { opacity: 1; }

        /* Header */
        .app-header { flex-shrink: 0; padding: calc(15px + env(safe-area-inset-top)) 15px 10px; background: var(--nav-bg); border-bottom: 1px solid var(--border-color); display: flex; flex-direction: column; align-items: center; }
        .marquee-row { display: flex; align-items: center; background: rgba(255,255,255,0.05); padding: 6px 12px; border-radius: 10px; margin-bottom: 12px; overflow: hidden; width: 100%; }
        .v-tag { background: var(--accent-color); color: #000; font-size: 9px; font-weight: 900; padding: 2px 6px; border-radius: 4px; margin-right: 10px; }
        .mq-box { flex: 1; overflow: hidden; white-space: nowrap; }
        .mq-text { display: inline-block; padding-left: 100%; animation: mq 25s linear infinite; font-size: 11px; color: #fff; }
        @keyframes mq { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        .brand-title-link { display: block; width: 100%; margin-bottom: 5px; text-decoration: none; }
        .brand-title-img { width: 100%; height: auto; display: block; border-radius: 8px; }

        /* Content */
        #main-view { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; background: #000; }
        .section-label { padding: 20px 15px 10px; font-weight: bold; font-size: 1.1rem; color: #fff; }
        .horizontal-slider { display: flex; gap: 15px; padding: 0 15px 20px; overflow-x: auto; scrollbar-width: none; }
        .horizontal-slider::-webkit-scrollbar { display: none; }
        .mid-card { min-width: 210px; height: 140px; border-radius: 15px; display: flex; align-items: flex-end; padding: 15px; background-size: cover; background-position: center; border: 1px solid rgba(255,255,255,0.08); color: #fff; font-weight: 600; }

        /* 文章列表 */
        .article-row { display: flex; gap: 12px; padding: 12px 15px; border-bottom: 1px solid var(--border-color); align-items: center; text-decoration: none; transition: background 0.2s; }
        .article-row:active { background: rgba(255,255,255,0.1); }
        .row-img { width: 75px; height: 75px; border-radius: 12px; object-fit: cover; background: #222; flex-shrink: 0; }
        .row-info { flex: 1; display: flex; flex-direction: column; gap: 4px; overflow: hidden; }
        .row-title { font-size: 14px; font-weight: 600; color: #eee; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .row-meta { font-size: 11px; color: var(--text-sub); }

        .bottom-nav { flex-shrink: 0; height: calc(60px + env(safe-area-inset-bottom)); background-color: var(--nav-bg); border-top: 1px solid var(--border-color); display: flex; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-sub); text-decoration: none; font-size: 10px; gap: 4px; }
        .nav-item i { font-size: 18px; }
    </style>
</head>
<body>

    <div id="ms-splash"></div>

    <div id="app-container">
        <header class="app-header">
            <nav class="marquee-row">
                <span class="v-tag" id="v-tag">SYNCING</span>
                <div class="mq-box"><div class="mq-text" id="mq-text">正在同步 Ⲙ𝔬ⲃ¡ⳝ𝔭ⲁ𝔠ⲉ 數據...</div></div>
            </nav>
            <a href="https://mobsp.github.io/blog/" class="brand-title-link">
                <img src="https://mobsp.github.io/assets/brand/ms-blog-title.webp" alt="莫比部落格" class="brand-title-img">
            </a>
        </header>

        <main id="main-view">
            <div class="section-label">最新精選</div>
            <div class="horizontal-slider">
                <div class="mid-card" style="background-image: linear-gradient(transparent, rgba(0,0,0,0.85)), url('https://mobsp.github.io/assets/brand/ms-post.webp');">
                    <span style="font-size: 13px;">雲林租屋紀實</span>
                </div>
                <div class="mid-card" style="background-image: linear-gradient(transparent, rgba(0,0,0,0.85)), url('https://mobsp.github.io/assets/brand/ms-post.webp');">
                    <span style="font-size: 13px;">PWA 技術實踐</span>
                </div>
            </div>
            <div class="list-header"><span style="font-weight: bold; color: #fff; padding-left:15px;">全部文章</span></div>
            <div id="github-articles"></div>
        </main>

        <nav class="bottom-nav">
            <a href="/music/" class="nav-item"><i class="fa-solid fa-music"></i><span>音樂</span></a>
            <a href="/shorts/" class="nav-item"><i class="fa-brands fa-youtube"></i><span>Shorts</span></a>
            <a href="/wiki/" class="nav-item"><i class="fa-solid fa-circle-info"></i><span>支援</span></a>
            <a href="/setting" class="nav-item"><i class="fa-solid fa-gear"></i><span>設定</span></a>
        </nav>
    </div>

    <script>
        // 1. 強制解除啟動畫面的邏輯
        const splash = document.getElementById('ms-splash');
        function forceHideSplash() {
            if (splash && !splash.classList.contains('hide')) {
                splash.classList.add('hide');
                document.body.classList.add('loaded');
            }
        }
        window.addEventListener('load', () => setTimeout(forceHideSplash, 800));
        setTimeout(forceHideSplash, 3000); // 兜底保障

        // 2. GitHub 文章加載：核心 URL 修正
        const GH_CONFIG = { user: 'mobsp', repo: 'mobsp.github.io', path: 'blog/p/list' };
        
        async function loadGithubArticles() {
            const container = document.getElementById('github-articles');
            const api_url = `https://api.github.com/repos/${GH_CONFIG.user}/${GH_CONFIG.repo}/contents/${GH_CONFIG.path}`;
            try {
                const response = await fetch(api_url);
                if (!response.ok) return;
                const files = await response.json();
                
                // 只抓 .md 檔案
                const mdFiles = files.filter(f => f.name.endsWith('.md'));
                
                if (mdFiles.length === 0) {
                    container.innerHTML = '<div style="color:#555; text-align:center; padding:50px;">尚無文章內容</div>';
                    return;
                }

                container.innerHTML = '';
                mdFiles.forEach(file => {
                    // --- 關鍵路徑轉換邏輯 ---
                    // 原始檔名: 2026-03-19-yunlin-full.md
                    // Jekyll 生成網址: https://mobsp.github.io/blog/p/list/yunlin-full/
                    
                    const fileNameNoExt = file.name.replace('.md', ''); // 2026-03-19-yunlin-full
                    
                    // 去除前綴日期 (前 11 個字元: YYYY-MM-DD-)
                    const cleanSlug = fileNameNoExt.replace(/^\d{4}-\d{2}-\d{2}-/, ''); // yunlin-full
                    
                    // 顯示標題與日期
                    const displayTitle = cleanSlug.replace(/-/g, ' ').toUpperCase();
                    const postDate = fileNameNoExt.substring(0, 10);

                    // 構建正確的 Jekyll URL 路徑
                    const finalUrl = `https://mobsp.github.io/blog/p/list/${cleanSlug}.html`;

                    container.insertAdjacentHTML('beforeend', `
                        <a href="${finalUrl}" class="article-row">
                            <img src="https://mobsp.github.io/assets/brand/ms-post.webp" class="row-img">
                            <div class="row-info">
                                <div class="row-title">${displayTitle}</div>
                                <div class="row-meta"><i class="fa-regular fa-clock"></i> ${postDate} · Ⲙ𝔬ⲃ¡ⳝ𝔭ⲁ𝔠ⲉ</div>
                            </div>
                            <i class="fa-solid fa-chevron-right" style="color:#262626; font-size:12px;"></i>
                        </a>
                    `);
                });
            } catch (err) { 
                container.innerHTML = '<div style="color:red; text-align:center; padding:20px;">加載失敗，請檢查網路連接</div>';
            }
        }

        loadGithubArticles();
    </script>
</body>
</html>
