<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>大嫂與二哥 | 設定已整合 | Ⲙ𝔬ⲃ¡ⳝ𝔭ⲁ𝔠ⲉ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --ios-bg: #000000;
            --ios-card: rgba(28, 28, 30, 0.7);
            
            /* 預設字體顏色和大小 */
            --article-text-color: #ffffff;
            --article-font-size: 17px;

            --ios-secondary: #8e8e93;
            --accent-color: #00cec9;
            --panel-bg: rgba(30, 30, 30, 0.85); /* 彈窗背景 */
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            background-color: var(--ios-bg); color: var(--ios-text); line-height: 1.7; overflow-x: hidden;
        }

        /* 流光背景 */
        .glass-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 20% 30%, #1a1a2e 0%, #000 50%), radial-gradient(circle at 80% 70%, #002b2b 0%, #000 50%); z-index: -1; }
        
        /* 文章容器 */
        .article-container { max-width: 480px; margin: 0 auto; min-height: 100dvh; padding: calc(20px + env(safe-area-inset-top)) 20px 150px; backdrop-filter: blur(10px); }
        
        /* 導覽列 */
        .nav-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; }
        .back-btn { color: var(--accent-color); text-decoration: none; font-size: 17px; display: flex; align-items: center; gap: 5px; }
        
        /* 文章頭部 */
        .post-header { margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; }
        .post-category { font-size: 12px; font-weight: 700; color: #ff4d4d; text-transform: uppercase; margin-bottom: 8px; display: block; }
        .post-title { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 10px; color: #fff; }
        .post-meta { font-size: 13px; color: var(--ios-secondary); display: flex; gap: 15px; }
        
        /* 文章內容：使用 CSS 變數控制顏色和大小 */
        .post-content { 
            font-size: var(--article-font-size); 
            color: var(--article-text-color); 
            white-space: pre-wrap; 
            transition: color 0.2s, font-size 0.2s; /* 增加平滑過渡 */
        }
        .post-content p { margin-bottom: 20px; text-align: justify; }

        /* =========================================
           1. 浮動設定按鈕 (iOS 風格齒輪)
           ========================================= */
        .mobi-settings-btn {
            position: fixed; bottom: 30px; right: 20px;
            width: 50px; height: 50px;
            background: rgba(44, 44, 46, 0.9);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 24px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
            cursor: pointer; z-index: 1000;
            transition: 0.3s;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .mobi-settings-btn:active { transform: scale(0.9); opacity: 0.8; }

        /* =========================================
           2. 設定彈窗控制台 (Settings Panel)
           ========================================= */
        .mobi-settings-panel {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            border-top-left-radius: 20px; border-top-right-radius: 20px;
            padding: calc(25px + env(safe-area-inset-top)) 20px calc(40px + env(safe-area-inset-bottom));
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
            transform: translateY(100%); /* 預設隱藏在下方 */
            transition: transform 0.4s cubic-bezier(0.3, 0.8, 0.4, 1);
            z-index: 999;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .mobi-settings-panel.show { transform: translateY(0); } /* 顯示彈窗 */

        /* 彈窗標題 */
        .panel-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 25px;
        }
        .panel-title { font-size: 18px; font-weight: 700; color: #fff; }
        .close-panel { color: var(--accent-color); font-size: 16px; font-weight: 600; cursor: pointer; }

        /* 控制項區塊 */
        .control-group { margin-bottom: 25px; }
        .control-label {
            font-size: 14px; font-weight: 500; color: var(--ios-secondary);
            margin-bottom: 12px; display: flex; justify-content: space-between;
        }
        .control-value { color: #fff; font-weight: 600; font-family: monospace; }

        /* =========================================
           3. iOS 風格滑塊 (Input Sliders)
           ========================================= */
        input[type="range"] {
            -webkit-appearance: none; appearance: none;
            width: 100%; height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 5px; outline: none; opacity: 0.9;
            transition: 0.2s;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 24px; height: 24px;
            background: #ffffff;
            border-radius: 50%; cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            border: 2px solid #000;
            transition: 0.2s;
        }
        input[type="range"]::-webkit-slider-thumb:active { transform: scale(1.1); box-shadow: 0 0 10px rgba(255,255,255,0.5); }

        /* 特殊滑塊：字體顏色（從黑到白漸層） */
        #colorSlider {
            background: linear-gradient(to right, #ffffff 0%, #000000 100%);
            border: 1px solid rgba(255,255,255,0.2);
        }
        /* 特殊滑塊：字體大小（預設樣式即可） */
        #fontSizeSlider { background: rgba(0,206,201,0.2); } /* 使用品牌色背景 */

        /* 分享按鈕 */
        .footer-action { margin-top: 30px; text-align: center; }
        .share-btn { background: var(--accent-color); color: #000; border: none; width: 100%; padding: 16px; border-radius: 15px; font-size: 16px; font-weight: 600; cursor: pointer; }

    </style>
</head>
<body>
    <div class="glass-bg"></div>

    <div class="mobi-settings-btn" id="mobiSettingsBtn">
        <i class="fa-solid fa-gear"></i>
    </div>

    <div class="mobi-settings-panel" id="mobiSettingsPanel">
        <header class="panel-header">
            <span class="panel-title">閱讀設定</span>
            <span class="close-panel" id="closePanelBtn">完成</span>
        </header>

        <div class="control-group">
            <label class="control-label">
                <span>字體顏色 (黑↔白)</span>
                <span class="control-value" id="colorValue">#ffffff</span>
            </label>
            <input type="range" id="colorSlider" min="0" max="255" value="0">
        </div>

        <div class="control-group">
            <label class="control-label">
                <span>字體大小</span>
                <span class="control-value" id="fontSizeValue">17px</span>
            </label>
            <input type="range" id="fontSizeSlider" min="12" max="32" value="17">
        </div>
    </div>

    <div class="article-container">
        <header class="nav-header">
            <a href="/blog/" class="back-btn"><i class="fa-solid fa-chevron-left"></i> 莫比部落格</a>
            <i class="fa-solid fa-ellipsis" style="color: var(--ios-secondary);"></i>
        </header>

        <article>
            <div class="post-header">
                <span class="post-category">家庭亂倫</span>
                <h1 class="post-title">大嫂與二哥</h1>
                <div class="post-meta">
                    <span><i class="fa-regular fa-calendar"></i> 2026-03-19</span>
                    <span><i class="fa-regular fa-user"></i> Ⲙ𝔬ⲃ¡ⳝ𝔭ⲁ𝔠ⲉ</span>
                </div>
            </div>

            <div class="post-content">
                <p>我從小到大都在台北長大念書，過習慣了都市生活，但在念研究所時，卻跑到雲林讀雲科大，原因很簡單，就是考研究所時考得不理想，實在沒幾所能挑，但心想能離開家也不錯，爸媽觀念那麼保守，我住家裡要交女友會很困難地，交了也不能帶回家幹，真的很討厭。</p>
<p>就這樣，之後大嫂常常打電話問我在哪裡，我總是帶她到各地方做愛，雲林太多地方可以在戶外做愛了，不像在台北只能當車床族，而在家，只要是沒人時，大嫂都會主動找我，要我幹幹她才行，就這樣我也變成很忙碌的學生了。</p>
            </div>
        </article>

        <div class="footer-action">
            <button class="share-btn" onclick="navigator.share({title: '大嫂與二哥', url: window.location.href})">分享文章</button>
        </div>
    </div>

    <script>
        const settingsBtn = document.getElementById('mobiSettingsBtn');
        const settingsPanel = document.getElementById('mobiSettingsPanel');
        const closePanelBtn = document.getElementById('closePanelBtn');
        const root = document.documentElement; // 獲取 CSS 根元素 (:root)

        // 色彩控制 (黑到白漸層)
        const colorSlider = document.getElementById('colorSlider');
        const colorValue = document.getElementById('colorValue');

        // 字體大小控制
        const fontSizeSlider = document.getElementById('fontSizeSlider');
        const fontSizeValue = document.getElementById('fontSizeValue');

        // --- 彈窗顯示/隱藏邏輯 ---
        function togglePanel() {
            settingsPanel.classList.toggle('show');
            // 當彈窗打開時，禁用主體滾動
            document.body.style.overflow = settingsPanel.classList.contains('show') ? 'hidden' : '';
        }

        settingsBtn.addEventListener('click', togglePanel);
        closePanelBtn.addEventListener('click', togglePanel);

        // --- 字體顏色調整邏輯 ---
        colorSlider.addEventListener('input', () => {
            // value 0 -> #ffffff (白)
            // value 255 -> #000000 (黑)
            const val = 255 - colorSlider.value; // 反轉值
            const hex = val.toString(16).padStart(2, '0'); // 轉為 16 進位
            const finalColor = `#${hex}${hex}${hex}`; // 構建顏色 #xxxxxx

            // 1. 更新 CSS 變數
            root.style.setProperty('--article-text-color', finalColor);
            // 2. 更新彈窗數值顯示
            colorValue.innerText = finalColor;

            // 根據顏色深淺動態調整滑塊頭部顏色，保持對比
            const thumbColor = colorSlider.value > 128 ? '#ffffff' : '#000000';
            colorSlider.style.setProperty('--thumb-color', thumbColor); // (可選，需額外 CSS 配合)
        });

        // --- 字體大小調整邏輯 ---
        fontSizeSlider.addEventListener('input', () => {
            const size = fontSizeSlider.value;
            // 1. 更新 CSS 變數
            root.style.setProperty('--article-font-size', `${size}px`);
            // 2. 更新彈窗數值顯示
            fontSizeValue.innerText = `${size}px`;
        });

        // 頁面加載時初始化
        function initSettings() {
            // 初始化字體大小
            root.style.setProperty('--article-font-size', '17px');
            // 初始化字體顏色 (白)
            root.style.setProperty('--article-text-color', '#ffffff');
        }

        initSettings();
    </script>
</body>
</html>
