<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ⲙ𝔬ⲃ¡ⳝ𝔭ⲁⲉ Authority V7.0 | 旗艦實戰發佈器</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --accent: #00cec9; --bg: #000; --container: #0a0a0a;
            --text: #e0e0e0; --sub: #666; --border: #222;
            --danger: #ff4d4d; --fs-base: 14px;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: -apple-system, sans-serif; font-size: var(--fs-base);
            height: 100dvh; overflow: hidden; position: fixed; width: 100%;
        }
        #bg-canvas { position: fixed; inset: 0; z-index: -1; opacity: 0.2; pointer-events: none; }
        #app { 
            max-width: 500px; margin: 0 auto; height: 100dvh; 
            display: flex; flex-direction: column; background: var(--container);
            border-left: 1px solid var(--border); border-right: 1px solid var(--border);
            position: relative;
        }
        #security-alert { background: rgba(255, 77, 77, 0.1); color: var(--danger); padding: 10px; font-size: 11px; display: none; border-bottom: 1px solid var(--danger); text-align: center; }
        header { flex-shrink: 0; padding: calc(45px + env(safe-area-inset-top)) 20px 10px; border-bottom: 1px solid var(--border); }
        #main-stage { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
        .view { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 20px 20px 100px; display: none; }
        .view.active { display: block; }
        .field { margin-bottom: 20px; }
        label { display: block; font-size: 11px; color: var(--sub); margin-bottom: 8px; text-transform: uppercase; font-weight: bold; }
        input, textarea, select { width: 100%; background: #111; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 10px; font-size: 14px; outline: none; }
        input:focus { border-color: var(--accent); }
        .btn { border: none; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: bold; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: #000; padding: 15px; width: 100%; margin-top: 10px; }
        .btn-ghost { background: #1a1a1a; color: #ccc; padding: 8px 12px; font-size: 11px; border: 1px solid var(--border); }
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; width: 80%; }
        .toast { background: #111; border: 1px solid var(--accent); padding: 12px; border-radius: 10px; margin-bottom: 10px; text-align: center; font-size: 12px; animation: toastIn 0.3s; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        @keyframes toastIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        nav { flex-shrink: 0; height: calc(70px + env(safe-area-inset-bottom)); background: #000; border-top: 1px solid var(--border); display: flex; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--sub); font-size: 10px; text-decoration: none; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        #preview-box { position: fixed; inset: 0; background: #000; z-index: 6000; display: none; flex-direction: column; padding-top: env(safe-area-inset-top); }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div id="toast-container"></div>
    <div id="security-alert">⚠️ Token 格式不正確</div>

    <div id="preview-box">
        <div style="padding: 20px; display: flex; justify-content: space-between; border-bottom: 1px solid #222;">
            <b style="color:var(--accent)">內容預覽</b>
            <button class="btn btn-ghost" onclick="closePreview()">關閉</button>
        </div>
        <div id="preview-body" style="flex:1; overflow-y:auto; padding: 20px; background: #000; color: #fff;"></div>
    </div>

    <div id="app">
        <header>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div style="font-size: 12px; font-weight: 900; color: var(--accent); letter-spacing: 2px;">Ⲙ𝔬ⲃ¡ⳝ𝔭ⲁⲉ AUTHORITY V7.0</div>
                <a href="https://mobsp.github.io/blog/" class="btn btn-ghost" style="border-radius: 50px;"><i class="fa-solid fa-house"></i></a>
            </div>
        </header>

        <div id="main-stage">
            <div id="view-pub" class="view active">
                <div class="field">
                    <label>GitHub Access Token</label>
                    <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxx" oninput="checkToken(this.value)">
                </div>

                <div id="article-list">
                    <div class="article-item" style="border-bottom: 1px solid #222; padding-bottom: 20px; margin-bottom: 20px;">
                        <div class="field">
                            <label>文章標題</label>
                            <input type="text" class="post-title" placeholder="標題名稱...">
                        </div>
                        <div class="field">
                            <label>分類標籤</label>
                            <select class="post-cate">
                                <option value="🔞 18禁">🔞 18禁</option>
                                <option value="技術分享">技術分享</option>
                                <option value="生活隨筆">生活隨筆</option>
                            </select>
                        </div>
                        <div class="field">
                            <label>內容 (Markdown)</label>
                            <div style="display:flex; gap:8px; margin-bottom:10px;">
                                <button class="btn btn-ghost" onclick="showPreview(this)">即時預覽</button>
                            </div>
                            <textarea class="post-content" rows="10" placeholder="在此輸入內容..."></textarea>
                        </div>
                    </div>
                </div>

                <div class="field" style="display: flex; gap: 10px;">
                    <input type="checkbox" id="clear-after" checked style="width: 20px;"> 
                    <span style="font-size: 12px; color: #888;">發佈後清空欄位</span>
                </div>

                <button class="btn btn-primary" onclick="finalPublish()"><i class="fa-solid fa-paper-plane"></i> 執行全權限發佈</button>
            </div>

            <div id="view-settings" class="view">
                <h3 style="color:var(--accent)">系統設定</h3>
                <button class="btn btn-ghost" style="width:100%; color:var(--danger);" onclick="localStorage.clear(); location.reload();">重置 Token 與系統</button>
            </div>
        </div>

        <nav>
            <div class="nav-item active" onclick="tabs(0, this)"><i class="fa-solid fa-pen-nib"></i><span>發佈器</span></div>
            <div class="nav-item" onclick="tabs(1, this)"><i class="fa-solid fa-gear"></i><span>設定</span></div>
        </nav>
    </div>

    <script>
        window.onload = () => {
            const savedToken = localStorage.getItem('gh_token');
            if(savedToken) document.getElementById('gh-token').value = savedToken;
            initBg();
        };

        function checkToken(v) {
            document.getElementById('security-alert').style.display = (v && !v.startsWith('ghp_')) ? 'block' : 'none';
            localStorage.setItem('gh_token', v);
        }

        function showPreview(btn) {
            const content = btn.closest('.article-item').querySelector('.post-content').value;
            document.getElementById('preview-body').innerHTML = marked.parse(content);
            document.getElementById('preview-box').style.display = 'flex';
        }

        function closePreview() { document.getElementById('preview-box').style.display = 'none'; }

        /* === 核心：生成部落格 HTML 模板 (旗艦實戰樣式) === */
        function generatePostHTML(title, content, cate) {
            const isAdult = cate.includes("🔞");
            const year = new Date().getFullYear();
            const markdownBody = marked.parse(content);

            // 使用模板字串時，將內部的反引號轉義，避免 JS 報錯
            return `<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>${title} | Ⲙ𝔬ⲃ¡ⳝ𝔭ⲁⲉ</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"><\/script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --ios-bg: #000; --text-color: #fff; --font-size: 18px; --accent: #00cec9; --danger: #ff4d4d; --panel-bg: rgba(28, 28, 30, 0.95); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--ios-bg); color: var(--text-color); line-height: 1.8; overflow-x: hidden; }
        .header-fixed { position: fixed; top: 0; left: 0; width: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; padding: 0 20px; justify-content: space-between; padding-top: env(safe-area-inset-top); height: calc(60px + env(safe-area-inset-top)); }
        .main-content { max-width: 600px; margin: 0 auto; padding: calc(80px + env(safe-area-inset-top)) 20px 150px; }
        .post-label { font-size: 12px; color: var(--danger); font-weight: bold; margin-bottom: 10px; display: block; letter-spacing: 1px; }
        h1 { font-size: 28px; font-weight: 800; margin-bottom: 30px; line-height: 1.3; color: #fff; }
        .content-body { font-size: var(--font-size); color: var(--text-color); text-align: justify; }
        .content-body img { max-width: 100%; border-radius: 12px; margin: 10px 0; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: calc(70px + env(safe-area-inset-bottom)); background: rgba(20,20,22,0.95); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.1); z-index: 100; display: flex; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { color: #8e8e93; text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 10px; gap: 5px; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        .mobi-panel { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--panel-bg); backdrop-filter: blur(30px); border-radius: 25px 25px 0 0; padding: 30px 20px calc(40px + env(safe-area-inset-bottom)); transform: translateY(100%); transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: 1000; border-top: 1px solid rgba(255,255,255,0.1); }
        .mobi-panel.show { transform: translateY(0); }
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 4px; background: #333; border-radius: 2px; }
        #gate { position: fixed; inset: 0; background: #000; z-index: 10000; display: ${isAdult ? 'flex' : 'none'}; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .gate-box { padding: 40px 25px; border: 1px solid var(--danger); border-radius: 30px; background: #0a0000; box-shadow: 0 0 50px rgba(255,77,77,0.2); }
        .gate-btn { background: var(--danger); color: #fff; border: none; padding: 15px 50px; border-radius: 50px; font-weight: bold; margin-top: 30px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="gate"><div class="gate-box"><h2 style="color:var(--danger)">18禁限制內容</h2><p style="color:#666;font-size:14px;margin-top:15px;">確認您已滿 18 歲。</p><button class="gate-btn" onclick="document.getElementById('gate').style.display='none'">進入</button></div></div>
    <header class="header-fixed"><a href="/blog/" style="color:var(--accent);text-decoration:none"><i class="fa-solid fa-chevron-left"></i> 返回</a><div style="font-weight:bold;color:var(--accent)">Ⲙ𝔬ⲃ¡ⳝ𝔭ⲁⲉ</div><div></div></header>
    <div class="main-content"><span class="post-label"># ${cate}</span><h1>${title}</h1><div class="content-body">${markdownBody}</div></div>
    <nav class="bottom-nav"><div class="nav-item"><i class="fa-solid fa-house"></i><span>首頁</span></div><div class="nav-item active"><i class="fa-solid fa-book-open"></i><span>閱讀</span></div><div class="nav-item" onclick="togglePanel(true)"><i class="fa-solid fa-sliders"></i><span>設定</span></div></nav>
    <div class="mobi-panel" id="mobiPanel">
        <div style="display:flex;justify-content:space-between;margin-bottom:30px"><b>閱讀設定</b><span onclick="togglePanel(false)" style="color:var(--accent)">完成</span></div>
        <div style="margin-bottom:25px"><label style="color:#8e8e93;font-size:12px">文字亮度</label><input type="range" min="50" max="255" value="255" oninput="updateColor(this.value)"></div>
        <div><label style="color:#8e8e93;font-size:12px">字體大小</label><input type="range" min="14" max="32" value="18" oninput="updateSize(this.value)"></div>
    </div>
    <script>
        function togglePanel(s){ document.getElementById('mobiPanel').classList.toggle('show',s); }
        function updateColor(v){ document.documentElement.style.setProperty('--text-color',\`rgb(\${v},\${v},\${v})\`); }
        function updateSize(v){ document.documentElement.style.setProperty('--font-size',v+'px'); }
    <\/script>
</body>
</html>`;
        }

        async function finalPublish() {
            const token = document.getElementById('gh-token').value;
            const repo = "mobsp/mobsp.github.io";
            if(!token) return toast("請輸入 Token", "error");

            const items = document.querySelectorAll('.article-item');
            for(let item of items) {
                const title = item.querySelector('.post-title').value.trim();
                const content = item.querySelector('.post-content').value;
                const cate = item.querySelector('.post-cate').value;

                if(!title || !content) continue;

                const finalHTML = generatePostHTML(title, content, cate);
                const path = `blog/p/list/[${cate}]-${encodeURIComponent(title)}.html`;

                toast(`同步中: ${title}...`);
                try {
                    const base64Content = btoa(unescape(encodeURIComponent(finalHTML)));
                    const res = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
                        method: "PUT",
                        headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                        body: JSON.stringify({ message: `V7 Publish: ${title}`, content: base64Content, branch: "main" })
                    });

                    if(res.ok) {
                        toast(`✅ ${title} 發佈成功！`);
                        if(document.getElementById('clear-after').checked) {
                            item.querySelector('.post-title').value = "";
                            item.querySelector('.post-content').value = "";
                        }
                    } else { toast("❌ 發佈失敗", "error"); }
                } catch (e) { toast("連線失敗", "error"); }
            }
        }

        function tabs(i, el) {
            document.querySelectorAll('.view').forEach((v, idx) => v.classList.toggle('active', i === idx));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        function toast(m, type="success") {
            const c = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = 'toast';
            if(type === 'error') t.style.borderColor = 'red';
            t.innerText = m;
            c.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        function initBg() {
            const cvs = document.getElementById('bg-canvas');
            const ctx = cvs.getContext('2d');
            let w = cvs.width = window.innerWidth, h = cvs.height = window.innerHeight;
            function draw() {
                ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,w,h);
                ctx.fillStyle = "#00cec9";
                for(let i=0; i<2; i++) ctx.fillRect(Math.random()*w, Math.random()*h, 2, 2);
                requestAnimationFrame(draw);
            }
            draw();
        }
    </script>
</body>
</html>
