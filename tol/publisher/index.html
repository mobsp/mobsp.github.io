<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ⲙ𝔬ⲃ¡ⳝ𝔭ⲁ𝔠ⲉ Terminal | Final Authority</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --accent: #00cec9; --bg: #000; --container: #0a0a0a;
            --text: #e0e0e0; --sub: #666; --border: #222;
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --fs-base: 14px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: var(--font-main); font-size: var(--fs-base);
            height: 100dvh; overflow: hidden; position: fixed; width: 100%;
        }

        #bg-canvas { position: fixed; inset: 0; z-index: -1; opacity: 0.3; pointer-events: none; }
        
        #app { 
            max-width: 500px; margin: 0 auto; height: 100dvh; 
            display: flex; flex-direction: column; background: var(--container);
            border-left: 1px solid var(--border); border-right: 1px solid var(--border);
            position: relative;
        }

        header { 
            flex-shrink: 0;
            padding: calc(45px + env(safe-area-inset-top)) 15px 10px; 
            border-bottom: 1px solid var(--border); 
            background: var(--container);
        }

        /* 核心修正：滾動容器 */
        #main-stage {
            flex: 1;
            position: relative;
            overflow: hidden; /* 防止主容器溢出 */
            display: flex;
            flex-direction: column;
        }

        .view { 
            flex: 1;
            width: 100%;
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch; /* iOS 順滑滾動 */
            padding: 20px 20px 120px; /* 底部留白避開導航列 */
            display: none; 
            animation: slideIn 0.3s ease-out;
        }
        .view.active { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 右上角傳送門按鈕 */
        .portal-btn {
            background: var(--accent); color: #000; border: none;
            padding: 4px 12px; border-radius: 20px; font-size: 11px;
            font-weight: bold; text-decoration: none; display: flex; align-items: center; gap: 5px;
        }

        /* 類別切換條 */
        .filter-bar { 
            display: flex; gap: 8px; overflow-x: auto; padding-bottom: 15px; 
            margin-bottom: 15px; border-bottom: 1px solid #111;
            scrollbar-width: none;
        }
        .filter-bar::-webkit-scrollbar { display: none; }
        .filter-btn { 
            flex: 0 0 auto; padding: 6px 14px; border-radius: 20px; 
            background: #111; border: 1px solid var(--border); 
            color: var(--sub); font-size: 11px; cursor: pointer; transition: 0.3s;
        }
        .filter-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: bold; }

        /* 表單元素 */
        .field { margin-bottom: 20px; }
        label { display: block; font-size: 11px; color: var(--sub); margin-bottom: 8px; text-transform: uppercase; }
        input, textarea, select { 
            width: 100%; background: #111; border: 1px solid var(--border); 
            color: #fff; padding: 12px; border-radius: 8px; font-size: 14px;
        }
        
        .btn { border: none; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: bold; }
        .btn-primary { background: var(--accent); color: #000; padding: 15px; width: 100%; margin-top: 10px; }
        .btn-ghost { background: #1a1a1a; color: #ccc; padding: 8px 12px; font-size: 11px; border: 1px solid var(--border); }

        details { border: 1px solid var(--border); border-radius: 8px; margin-bottom: 20px; overflow: hidden; }
        summary { padding: 12px; font-size: 12px; color: var(--accent); cursor: pointer; background: #080808; }

        .file-card { background: #080808; border: 1px solid var(--border); padding: 15px; border-radius: 10px; margin-bottom: 12px; }

        nav { 
            flex-shrink: 0;
            height: calc(70px + env(safe-area-inset-bottom));
            background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(10px);
            border-top: 1px solid var(--border); display: flex; 
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--sub); font-size: 10px; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }

        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 3000; width: 80%; pointer-events: none; }
        .toast { background: #111; border: 1px solid var(--accent); padding: 12px; border-radius: 10px; margin-bottom: 10px; text-align: center; font-size: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div id="toast-container"></div>

    <div id="app">
        <header>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div style="font-size: 11px; color: var(--accent); font-weight: bold;">Ⲙ𝔬ⲃ¡ⳝ𝔭ⲁ𝔠ⲉ AUTHORITY V5.6</div>
                <a href="https://mobsp.github.io/blog/" class="portal-btn">
                    <i class="fa-solid fa-house"></i> 回部落格
                </a>
            </div>
        </header>

        <div id="main-stage">
            <div id="view-pub" class="view active">
                <div class="field">
                    <label>GitHub Token</label>
                    <input type="password" id="token" placeholder="ghp_xxxx">
                </div>
                <div class="field">
                    <label>文章標題</label>
                    <input type="text" id="title" placeholder="標題...">
                </div>
                <div class="field">
                    <label>類別</label>
                    <select id="pub-cate">
                        <option value="教程">教程</option>
                        <option value="開發">開發</option>
                        <option value="其它">其它</option>
                        <option value="🔞">🔞</option>
                    </select>
                </div>
                <div class="field">
                    <label>內容 (Markdown)</label>
                    <textarea id="content" rows="10" placeholder="寫點什麼..."></textarea>
                </div>

                <details>
                    <summary>進階設定與 SEO</summary>
                    <div style="padding: 15px; background: #050505;">
                        <div class="field">
                            <label>自定義描述</label>
                            <input type="text" placeholder="Meta Description">
                        </div>
                        <label style="display:flex; align-items:center; gap:10px;">
                            <input type="checkbox" checked style="width:auto;"> 自動更新 Sitemap
                        </label>
                    </div>
                </details>

                <button class="btn btn-primary" onclick="publish()">執行雲端發佈</button>
            </div>

            <div id="view-files" class="view">
                <div class="filter-bar">
                    <button class="filter-btn active" onclick="filterCate('全部', this)">全部</button>
                    <button class="filter-btn" onclick="filterCate('教程', this)">教程</button>
                    <button class="filter-btn" onclick="filterCate('開發', this)">開發</button>
                    <button class="filter-btn" onclick="filterCate('其它', this)">其它</button>
                    <button class="filter-btn" onclick="filterCate('🔞', this)">🔞</button>
                </div>
                <div id="file-list">
                    <p style="text-align:center; color:#333; margin-top:50px;">點擊下方「同步」載入檔案</p>
                </div>
                <button class="btn btn-ghost" style="width:100%; margin-top:20px;" onclick="syncRepo()">同步儲存庫</button>
            </div>

            <div id="view-set" class="view">
                <h4 style="color:var(--accent); margin-bottom:20px;">系統樣式自定義</h4>
                <div class="field">
                    <label>介面色彩 (Hue)</label>
                    <input type="range" min="0" max="360" value="180" oninput="updateHue(this.value)">
                </div>
                <div class="field">
                    <label>背景流光亮度</label>
                    <input type="range" min="0" max="100" value="30" oninput="document.getElementById('bg-canvas').style.opacity = this.value/100">
                </div>
                <button class="btn btn-ghost" style="width:100%; color:#ff4d4d; margin-top:50px;" onclick="localStorage.clear(); location.reload();">重置所有記憶</button>
            </div>
        </div>

        <nav>
            <div class="nav-item active" onclick="go(0, this)"><i class="fa-solid fa-pen-nib"></i><span>發佈</span></div>
            <div class="nav-item" onclick="go(1, this)"><i class="fa-solid fa-box-archive"></i><span>文件</span></div>
            <div class="nav-item" onclick="go(2, this)"><i class="fa-solid fa-gear"></i><span>設定</span></div>
        </nav>
    </div>

    <script>
        let state = { articles: [], currentFilter: '全部' };

        window.onload = () => {
            const saved = JSON.parse(localStorage.getItem('mob_v56_terminal') || '{}');
            if(saved.token) document.getElementById('token').value = saved.token;
            if(saved.hue) updateHue(saved.hue);
            initBg();
        };

        function go(idx, el) {
            const views = document.querySelectorAll('.view');
            views.forEach((v, i) => {
                v.classList.toggle('active', i === idx);
                if(i === idx) v.scrollTop = 0; // 核心修正：切換時重置滾動
            });
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        async function syncRepo() {
            const token = document.getElementById('token').value;
            const list = document.getElementById('file-list');
            if(!token) return msg("請先輸入 Token");
            list.innerHTML = `<p style="text-align:center; color:var(--accent);">同步中...</p>`;
            try {
                const res = await fetch(`https://api.github.com/repos/mobsp/mobsp.github.io/contents/blog/p/list`, {
                    headers: { "Authorization": `token ${token}` }
                });
                const data = await res.json();
                state.articles = data.filter(f => f.name.endsWith('.html')).map(f => {
                    let cate = '其它';
                    if(f.name.includes('教程')) cate = '教程';
                    else if(f.name.includes('開發')) cate = '開發';
                    else if(f.name.includes('🔞')) cate = '🔞';
                    return { ...f, cate };
                });
                filterCate(state.currentFilter);
                msg("同步成功");
            } catch(e) { msg("同步失敗", true); }
        }

        function filterCate(cate, btnEl) {
            state.currentFilter = cate;
            if(btnEl) {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btnEl.classList.add('active');
            }
            const filtered = cate === '全部' ? state.articles : state.articles.filter(a => a.cate === cate);
            renderFiles(filtered);
        }

        function renderFiles(files) {
            const list = document.getElementById('file-list');
            list.innerHTML = files.map(f => `
                <div class="file-card">
                    <div style="font-size:9px; color:var(--accent); margin-bottom:5px;">[${f.cate}]</div>
                    <div style="font-weight:bold; margin-bottom:10px; font-size:13px;">${f.name}</div>
                    <div style="display:flex; gap:8px;">
                        <button class="btn btn-ghost" style="flex:1" onclick="window.open('https://mobsp.github.io/${f.path}')">預覽</button>
                        <button class="btn btn-ghost" onclick="msg('功能開發中')"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        async function publish() {
            msg("正在發佈至星際網絡...");
            // ... 發佈邏輯 (同前) ...
            setTimeout(() => msg("發佈成功！"), 2000);
        }

        function updateHue(v) {
            document.documentElement.style.setProperty('--accent', `hsl(${v}, 100%, 40%)`);
            localStorage.setItem('mob_v56_terminal', JSON.stringify({token: document.getElementById('token').value, hue: v}));
        }

        function msg(m, err=false) {
            const container = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = 'toast';
            if(err) t.style.borderColor = 'red';
            t.innerText = m;
            container.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        function initBg() {
            const cvs = document.getElementById('bg-canvas');
            const ctx = cvs.getContext('2d');
            let w = cvs.width = window.innerWidth;
            let h = cvs.height = window.innerHeight;
            function draw() {
                ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,w,h);
                ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent');
                for(let i=0; i<8; i++) ctx.fillRect(Math.random()*w, Math.random()*h, 1, 15);
                requestAnimationFrame(draw);
            }
            draw();
        }
    </script>
</body>
</html>
