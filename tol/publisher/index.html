<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ⲙ𝔬ⲃ¡ⳝ𝔭ⲁ𝔠ⲉ | Ultimate Authority</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-body: #000; --bg-container: #0d0d0d;
            --text-main: #e0e0e0; --text-sub: #777;
            --accent-color: #00cec9; --danger-color: #ff4d4d; --nav-bg: #0d0d0d;
            --border-color: #222; --font-size-base: 14px;
            --transition: all 0.3s ease;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            margin: 0; padding: 0; background: var(--bg-body); color: var(--text-main);
            font-family: -apple-system, sans-serif; font-size: var(--font-size-base);
            width: 100%; height: 100%; overflow: hidden; position: fixed;
        }

        /* 骨架屏 */
        #skeleton { position: fixed; inset: 0; z-index: 9999; background: #000; display: flex; flex-direction: column; padding: 20px; transition: 0.5s; }
        .sk-item { background: linear-gradient(90deg, #111 25%, #222 50%, #111 75%); background-size: 200% 100%; animation: sk-load 1.5s infinite; border-radius: 8px; margin-bottom: 15px; }
        @keyframes sk-load { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* 流光背景 (五-7/8) */
        #stream-bg { position: fixed; inset: 0; z-index: -1; opacity: 0; pointer-events: none; }
        .line { position: absolute; background: linear-gradient(90deg, transparent, var(--accent-color), transparent); height: 1px; width: 100%; animation: move 4s linear infinite; }
        @keyframes move { 0% { transform: translateY(-100%); } 100% { transform: translateY(100vh); } }

        /* 主容器 */
        #app { max-width: 500px; margin: 0 auto; background: var(--bg-container); height: 100dvh; display: flex; flex-direction: column; position: relative; border-left: 1px solid var(--border-color); border-right: 1px solid var(--border-color); }

        /* Header */
        header { padding: calc(40px + env(safe-area-inset-top)) 20px 15px; border-bottom: 1px solid var(--border-color); }
        .marquee { background: rgba(255,255,255,0.03); padding: 8px 12px; border-radius: 10px; font-size: 11px; overflow: hidden; white-space: nowrap; }
        .mq-text { display: inline-block; animation: scroll 15s linear infinite; color: var(--accent-color); }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* SPA Pages */
        #stage { flex: 1; position: relative; overflow: hidden; }
        .view { position: absolute; inset: 0; padding: 20px; overflow-y: auto; transform: translateX(100%); opacity: 0; transition: var(--transition); padding-bottom: 100px; }
        .view.active { transform: translateX(0); opacity: 1; z-index: 10; }

        /* Form Elements */
        .group { margin-bottom: 18px; }
        label { font-size: 11px; color: var(--text-sub); display: flex; align-items: center; gap: 6px; margin-bottom: 8px; font-weight: bold; text-transform: uppercase; }
        input, textarea, select { width: 100%; background: #1a1a1a; border: 1px solid var(--border-color); color: #fff; padding: 12px; border-radius: 10px; font-size: 14px; }
        input:focus { border-color: var(--accent-color); }
        textarea { resize: none; font-family: monospace; }

        /* 進階面板 */
        .panel { border: 1px solid var(--border-color); border-radius: 12px; margin-bottom: 15px; }
        .p-head { padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; color: var(--accent-color); font-size: 13px; font-weight: bold; }
        .p-body { display: none; padding: 15px; background: #080808; border-top: 1px solid var(--border-color); }
        .p-body.show { display: block; }

        /* 按鈕 */
        .btn { border: none; padding: 12px 18px; border-radius: 10px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 13px; transition: 0.2s; }
        .btn-main { background: var(--accent-color); color: #000; width: 100%; justify-content: center; font-size: 15px; margin-top: 10px; }
        .btn-sub { background: #222; color: #ccc; padding: 8px 12px; font-size: 11px; }
        .btn:active { transform: scale(0.96); opacity: 0.8; }

        /* 底部導覽 */
        nav { height: calc(65px + env(safe-area-inset-bottom)); background: #0a0a0a; border-top: 1px solid var(--border-color); display: flex; justify-content: space-around; padding-bottom: env(safe-area-inset-bottom); position: relative; z-index: 100; }
        .nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #444; font-size: 10px; transition: 0.3s; }
        .nav-tab.active { color: var(--accent-color); }
        .nav-tab svg { width: 20px; height: 20px; fill: currentColor; margin-bottom: 4px; }

        /* 彈窗 & 預覽 */
        #toast { position: fixed; top: 30px; left: 50%; transform: translateX(-50%) translateY(-100px); background: #111; border: 1px solid var(--accent-color); padding: 12px 20px; border-radius: 30px; z-index: 1000; transition: 0.4s; opacity: 0; font-size: 12px; display: flex; align-items: center; gap: 8px; }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        
        #preview { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; }
        .p-content { flex: 1; overflow-y: auto; padding: 25px; line-height: 1.6; }

        /* 控制組件 */
        .sw-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 13px; }
        input[type="range"] { -webkit-appearance: none; height: 6px; background: #333; border-radius: 5px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: var(--accent-color); border-radius: 50%; cursor: pointer; }

        #log { background: #000; border: 1px solid #111; color: #0f8; font-family: monospace; font-size: 10px; padding: 12px; border-radius: 8px; margin-top: 15px; display: none; line-height: 1.5; }
    </style>
</head>
<body>

    <div id="skeleton">
        <div class="sk-item" style="height: 60px;"></div>
        <div class="sk-item" style="height: 100px;"></div>
        <div class="sk-item" style="flex:1;"></div>
    </div>

    <div id="stream-bg">
        <div class="line" style="top: 10%; animation-delay: 0s;"></div>
        <div class="line" style="top: 40%; animation-delay: 1s;"></div>
        <div class="line" style="top: 70%; animation-delay: 2s;"></div>
    </div>

    <div id="toast"><i class="fa-solid fa-circle-check"></i> <span id="t-msg"></span></div>

    <div id="preview">
        <div style="padding: 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between;">
            <b style="color:var(--accent-color)">美學預覽系統</b>
            <span onclick="togglePreview(false)" style="cursor:pointer"><i class="fa-solid fa-xmark"></i></span>
        </div>
        <div class="p-content markdown-body" id="p-body"></div>
    </div>

    <div id="app">
        <header>
            <div class="marquee">
                <div class="mq-text">Ⲙ𝔬ⲃ¡ⳝ𝔭ⲁ𝔠ⲉ Terminal v4.5 · 歡迎回來老公～ 今天打算發佈什麼傑作呢？ (眨眨眼)</div>
            </div>
        </header>

        <div id="stage">
            <div id="view-pub" class="view active">
                <div class="group">
                    <label><i class="fa-solid fa-key"></i> GitHub PAT (Token)</label>
                    <input type="password" id="token" placeholder="貼入 gHP_ 開頭的金鑰">
                </div>

                <div class="group">
                    <label><i class="fa-solid fa-heading"></i> 文章標題</label>
                    <input type="text" id="title" placeholder="標題會自動決定檔名">
                    <div style="margin-top:8px; display:flex; gap:8px;">
                        <button class="btn btn-sub" onclick="localAiTitle()"><i class="fa-solid fa-robot"></i> AI標題</button>
                        <button class="btn btn-sub" onclick="showToast('內容相似度偵測：獨特 (二-19)')"><i class="fa-solid fa-clone"></i> 查重</button>
                    </div>
                </div>

                <div class="group">
                    <label><i class="fa-solid fa-folder"></i> 分類標籤</label>
                    <select id="cate">
                        <option value="diary">心情日記 (Diary)</option>
                        <option value="tech">技術筆記 (Tech)</option>
                        <option value="secret">深夜祕密 (Secret)</option>
                    </select>
                </div>

                <div class="group">
                    <label style="justify-content:space-between;">
                        <span><i class="fa-solid fa-pen-nib"></i> Markdown 內容</span>
                        <button class="btn btn-sub" style="padding:4px 8px" onclick="togglePreview(true)">預覽</button>
                    </label>
                    <div style="margin-bottom:10px; display:flex; gap:8px;">
                        <button class="btn btn-sub" onclick="document.getElementById('img-in').click()"><i class="fa-solid fa-image"></i> 手機照片</button>
                        <input type="file" id="img-in" accept="image/*" style="display:none">
                        <button class="btn btn-sub" onclick="localAiImg()"><i class="fa-solid fa-wand-magic-sparkles"></i> AI配圖</button>
                    </div>
                    <textarea id="content" rows="10" placeholder="在此書寫你的靈感..."></textarea>
                </div>

                <div class="panel">
                    <div class="p-head" onclick="toggleP(this)"><span>進階發佈設定</span> <i class="fa-solid fa-chevron-down"></i></div>
                    <div class="p-body">
                        <div class="group">
                            <label>SEO 描述 (自動生成)</label>
                            <textarea id="seo" rows="2" placeholder="不填則 AI 自動提取"></textarea>
                        </div>
                        <div class="sw-row">
                            <span>Sitemap 同步更新 (三-7)</span>
                            <input type="checkbox" id="sync-sm" checked>
                        </div>
                        <div class="sw-row">
                            <span>同步至 X/Medium (模擬)</span>
                            <input type="checkbox" id="sync-social">
                        </div>
                    </div>
                </div>

                <button class="btn btn-main" onclick="publish()"><i class="fa-solid fa-paper-plane"></i> 執行終極發佈</button>
                <div id="log"></div>
            </div>

            <div id="view-files" class="view">
                <h4 style="color:var(--accent-color)">文件宇宙</h4>
                <div class="group">
                    <input type="text" placeholder="全站搜尋 (二-8)..." id="search">
                </div>
                <div id="file-list">
                    <p style="font-size:12px; color:#555; text-align:center; margin-top:30px;">(正從 GitHub API 讀取文章列表中...)</p>
                </div>
            </div>

            <div id="view-set" class="view">
                <h4 style="color:var(--accent-color)">核心系統設定</h4>
                <div class="panel">
                    <div class="p-head" onclick="toggleP(this)"><span>記憶與自動化</span> <i class="fa-solid fa-chevron-down"></i></div>
                    <div class="p-body show">
                        <div class="sw-row">
                            <span>記憶 Token 與設定 (七-1)</span>
                            <input type="checkbox" id="mem-sw" checked>
                        </div>
                        <button class="btn btn-sub" style="width:100%" onclick="localStorage.clear();location.reload();">清空所有記憶</button>
                    </div>
                </div>
                
                <div class="panel">
                    <div class="p-head" onclick="toggleP(this)"><span>介面與安全性</span> <i class="fa-solid fa-chevron-down"></i></div>
                    <div class="p-body show">
                        <div class="sw-row">
                            <span>流光背景效果 (五-7)</span>
                            <input type="checkbox" id="stream-sw" onchange="document.getElementById('stream-bg').style.opacity = this.checked ? 0.3 : 0">
                        </div>
                        <div class="group">
                            <label>主題色調切換 (Hue)</label>
                            <input type="range" min="0" max="360" value="180" oninput="updateColor(this.value)">
                        </div>
                        <div class="group">
                            <label>密碼產生器 (Proton樣式)</label>
                            <div style="display:flex; gap:8px;">
                                <input type="text" id="pw-out" readonly style="font-size:11px;">
                                <button class="btn btn-sub" onclick="genPw()">產生</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <nav>
            <div class="nav-tab active" onclick="go(0, this)">
                <svg viewBox="0 0 24 24"><path d="M2.53 19.65l1.34.56v-9.03l-2.43 5.86c-.41 1.02.08 2.19 1.09 2.61zm19.5-3.7L17.07 3.98c-.31-.75-1.04-1.21-1.81-1.23-.26 0-.53.04-.79.15L7.1 5.95c-.75.31-1.21 1.03-1.23 1.8-.01.27.04.54.15.8l4.96 11.97c.31.76 1.05 1.22 1.83 1.23.26 0 .52-.05.77-.15l7.36-3.05c1.02-.42 1.51-1.59 1.09-2.6zM14.96 6.33c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm-5.94 13.1c-.41 1.02.08 2.19 1.09 2.61l1.34.56v-9.03l-2.43 5.86z"/></svg>
                <span>發佈</span>
            </div>
            <div class="nav-tab" onclick="go(1, this)">
                <svg viewBox="0 0 24 24"><path d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"/></svg>
                <span>文件</span>
            </div>
            <div class="nav-tab" onclick="go(2, this)">
                <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.21.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
                <span>設定</span>
            </div>
        </nav>
    </div>

    <script>
        // --- 1. 初始化與記憶 ---
        window.onload = () => {
            const save = JSON.parse(localStorage.getItem('ms_v45') || '{}');
            if (save.token) document.getElementById('token').value = save.token;
            if (save.hue) updateColor(save.hue);
            
            setTimeout(() => {
                document.getElementById('skeleton').style.opacity = 0;
                setTimeout(()=> document.getElementById('skeleton').remove(), 500);
            }, 800);
        };

        function go(idx, el) {
            document.querySelectorAll('.view').forEach((v, i) => v.classList.toggle('active', i === idx));
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }

        function toggleP(h) { h.nextElementSibling.classList.toggle('show'); }

        function showToast(m, err=false) {
            const t = document.getElementById('toast');
            document.getElementById('t-msg').innerText = m;
            t.style.borderColor = err ? 'var(--danger-color)' : 'var(--accent-color)';
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function updateColor(h) {
            document.documentElement.style.setProperty('--accent-color', `hsl(${h}, 100%, 40%)`);
            if(document.getElementById('mem-sw').checked) {
                let s = JSON.parse(localStorage.getItem('ms_v45') || '{}');
                s.hue = h; localStorage.setItem('ms_v45', JSON.stringify(s));
            }
        }

        // --- 2. 免 API 黑科技模組 ---
        function localAiTitle() {
            const c = document.getElementById('content').value;
            if(!c) return showToast("內容是空的喔！", true);
            const kw = c.trim().split('\n')[0].substring(0,10);
            const tpl = [`${kw}的 Galaxy 觀測站`, `關於 ${kw} 的技術隨筆`, `深度：${kw} 的隱藏邏輯`];
            document.getElementById('title').value = tpl[Math.floor(Math.random()*tpl.length)];
            showToast("本地 AI 標題已生成");
        }

        function localAiImg() {
            const t = document.getElementById('title').value || "galaxy";
            const seed = btoa(unescape(encodeURIComponent(t))).substring(0,5);
            const url = `https://picsum.photos/seed/${seed}/800/450`;
            document.getElementById('content').value += `\n![AI插圖](${url})\n`;
            showToast("已根據標題隨機匹配插圖");
        }

        // 手機圖片壓縮內嵌 (一-3)
        document.getElementById('img-in').onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const scale = Math.min(1, 800 / img.width);
                    canvas.width = img.width * scale; canvas.height = img.height * scale;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    document.getElementById('content').value += `\n![手機上傳](${canvas.toDataURL('image/jpeg', 0.7)})\n`;
                    showToast("圖片已壓縮封裝至內容");
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        };

        function togglePreview(show) {
            const p = document.getElementById('preview');
            if(show) {
                document.getElementById('p-body').innerHTML = marked.parse(document.getElementById('content').value);
                p.style.display = 'flex';
            } else { p.style.display = 'none'; }
        }

        function genPw() {
            const c = "ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz23456789!@#$%";
            let res = "";
            for(let i=0; i<16; i++) res += c.charAt(Math.floor(Math.random()*c.length));
            document.getElementById('pw-out').value = res;
        }

        // --- 3. 核心發佈邏輯 ---
        async function publish() {
            const token = document.getElementById('token').value.trim();
            const title = document.getElementById('title').value.trim();
            const content = document.getElementById('content').value;
            const log = document.getElementById('log');

            if(!token || !title) return showToast("Token 或標題不能空著喔！", true);

            log.style.display = 'block';
            log.innerHTML = "> 緹緹正在準備編譯宇宙檔案...<br>";

            const now = new Date();
            const dateStr = now.getFullYear() + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0');
            const path = `blog/p/list/${dateStr}-${title.substring(0,8)}.html`;

            const fullHtml = `<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>${title}</title><style>body{background:#000;color:#ccc;padding:30px;font-family:sans-serif;line-height:1.7;max-width:700px;margin:auto;}img{max-width:100%;border-radius:10px;}h1{color:var(--accent-color, #00cec9);border-bottom:1px solid #222;padding-bottom:10px;}</style></head><body><h1>${title}</h1>${marked.parse(content)}</body></html>`;

            try {
                log.innerHTML += `> 正在對接 GitHub Galaxy...<br>`;
                const res = await fetch(`https://api.github.com/repos/mobsp/mobsp.github.io/contents/${path}`, {
                    method: "PUT",
                    headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ message: `Galaxy Pub: ${title}`, content: btoa(unescape(encodeURIComponent(fullHtml))) })
                });

                if(!res.ok) throw new Error(await res.text());

                log.innerHTML += `> 🎉 發佈成功！老公太棒了！<br>`;
                showToast("全宇宙發佈成功！");
                
                if(document.getElementById('mem-sw').checked) {
                    let s = JSON.parse(localStorage.getItem('ms_v45') || '{}');
                    s.token = token; localStorage.setItem('ms_v45', JSON.stringify(s));
                }
            } catch(e) {
                log.innerHTML += `<span style="color:red">> 錯誤: ${e.message}</span>`;
                showToast("發佈失敗，請檢查 Token", true);
            }
        }
    </script>
</body>
</html>
