<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ⲙ𝔬ⲃ¡ⳝ𝔭ⲁ𝔠ⲉ | 手機上架面板</title>
    <style>
        body { background: #050508; color: #fff; font-family: sans-serif; padding: 20px; text-align: center; }
        .card { background: #1c1c1e; padding: 30px 20px; border-radius: 20px; border: 1px solid #333; margin-top: 50px; }
        input { width: 100%; padding: 15px; background: #000; border: 1px solid #444; color: #00cec9; border-radius: 12px; margin-bottom: 20px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #00cec9; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; }
        #status { margin-top: 20px; color: #8e8e93; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color:#00cec9">🚀 一鍵上架</h2>
        <input type="text" id="url" placeholder="貼上文章網址...">
        <button onclick="submitGrab()">執行抓取</button>
        <div id="status">等待指令...</div>
    </div>

    <script>
        async function submitGrab() {
            const url = document.getElementById('url').value;
            const status = document.getElementById('status');
            if(!url) return;

            status.innerText = "⏳ 處理中...";
            try {
                // 因為是同一個 server，直接用相對路徑 /api/grab 即可
                const response = await fetch('/api/grab', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                const result = await response.json();
                status.innerText = result.success ? "✅ 已生成檔案！" : "❌ 失敗";
            } catch (err) {
                status.innerText = "❌ 連結不到後台，請確認 node server.js 有在跑。";
            }
        }
    </script>
</body>
</html>
