<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ⲙ𝔬ⲃ¡ⳝ𝔭ⲁ𝔠ⲉ | 手動轉換工具</title>
    <style>
        body { background: #050508; color: #fff; font-family: -apple-system, sans-serif; padding: 20px; }
        .box { background: #1c1c1e; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: #00cec9; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #00cec9; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .hint { font-size: 12px; color: #8e8e93; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>📄 文章手動上架工具</h2>
        <p class="hint">手機操作專用：抓取內容 ➔ 套用模板 ➔ 下載檔案</p>
        
        <label>1. 貼上目標網址</label>
        <input type="text" id="url" placeholder="https://www.h528.com/...">
        
        <button onclick="fetchContent()">🔍 遠端抓取內容</button>
        
        <hr style="border: 0.5px solid #333; margin: 20px 0;">
        
        <label>2. 確認標題</label>
        <input type="text" id="title" placeholder="抓取後的標題會出現在這">
        
        <label>3. 確認內容 (可手動修改)</label>
        <textarea id="content" rows="10" placeholder="抓取後的內文會出現在這..."></textarea>
        
        <button onclick="downloadFile()" style="background: #fff; color: #000;">💾 生成並下載 HTML 檔案</button>
    </div>

    <script>
        // 使用公共代理繞過跨網域限制
        async function fetchContent() {
            const url = document.getElementById('url').value;
            if(!url) return alert('請輸入網址');
            
            document.getElementById('title').value = "正在抓取中...";
            
            try {
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
                const response = await fetch(proxyUrl);
                const data = await response.json();
                
                const parser = new DOMParser();
                const doc = parser.parseFromString(data.contents, 'text/html');
                
                // 抓取標題與段落
                const title = doc.querySelector('h1')?.innerText || "未命名文章";
                let content = "";
                doc.querySelectorAll('p').each((p) => {
                    if(p.innerText.trim()) content += p.innerText.trim() + "\n\n";
                });

                document.getElementById('title').value = title;
                document.getElementById('content').value = content;
            } catch (e) {
                alert('抓取失敗，請檢查網路或手動貼入內容');
                document.getElementById('title').value = "";
            }
        }

        function downloadFile() {
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;
            if(!title || !content) return alert('請先抓取或輸入內容');

            // 將純文字轉為您的流光模板格式
            const paragraphs = content.split('\n\n').map(p => `<p>${p}</p>`).join('\n                ');
            
            const template = `<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>${title} | Ⲙ𝔬ⲃ¡ⳝ𝔭ⲁ𝔠ⲉ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --ios-bg: #000; --article-text-color: #ffffff; --article-font-size: 17px; --accent-color: #00cec9; }
        body { font-family: -apple-system, sans-serif; background: #000; color: #fff; line-height: 1.7; margin: 0; }
        .article-container { max-width: 480px; margin: 0 auto; padding: 40px 20px 100px; }
        .post-content p { margin-bottom: 20px; text-align: justify; }
    </style>
</head>
<body>
    <div class="article-container">
        <h1>${title}</h1>
        <div class="post-content">${paragraphs}</div>
    </div>
</body>
</html>`;

            const blob = new Blob([template], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `${title.substring(0,10)}.html`;
            a.click();
        }
    </script>
</body>
</html>
