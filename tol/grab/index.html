<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ⲙ𝔬ⲃ¡ⳝ𝔭ⲁ𝔠ⲉ | 文章轉換器</title>
    <style>
        body { background: #050508; color: #fff; font-family: -apple-system, sans-serif; padding: 15px; }
        .card { background: #1c1c1e; padding: 20px; border-radius: 20px; border: 1px solid #333; max-width: 500px; margin: auto; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: #00cec9; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #00cec9; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; margin-top: 10px; color: #000; }
        .result-box { margin-top: 20px; display: none; }
        label { color: #8e8e93; font-size: 13px; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color:#00cec9; margin-top:0;">📄 文章自動抓取</h2>
        <label>步驟 1：貼上目標文章網址</label>
        <input type="text" id="targetUrl" placeholder="https://www.h528.com/...">
        <button id="grabBtn" onclick="fetchArticle()">🔍 開始抓取內容</button>

        <div id="resultArea" class="result-box">
            <hr style="border:0.5px solid #333; margin:20px 0;">
            <label>步驟 2：預覽並微調標題</label>
            <input type="text" id="resTitle">
            
            <label>步驟 3：複製下方代碼並存成 HTML</label>
            <textarea id="resCode" rows="15" readonly onclick="this.select()"></textarea>
            <button onclick="copyCode()" style="background:#fff;">📋 點擊複製全部代碼</button>
            <p id="status" style="font-size:12px; text-align:center; color:#8e8e93; margin-top:10px;"></p>
        </div>
    </div>

    <script>
        async function fetchArticle() {
            const url = document.getElementById('targetUrl').value;
            const btn = document.getElementById('grabBtn');
            if(!url) return alert('請輸入網址');

            btn.innerText = "⏳ 抓取中...";
            btn.disabled = true;

            try {
                // 使用公共代理繞過 CORS 限制
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
                const response = await fetch(proxyUrl);
                const data = await response.json();
                
                const parser = new DOMParser();
                const doc = parser.parseFromString(data.contents, 'text/html');
                
                // 自動解析標題與內文
                const title = doc.querySelector('h1')?.innerText.trim() || "未命名文章";
                let paragraphs = "";
                doc.querySelectorAll('p').forEach(p => {
                    const text = p.innerText.trim();
                    if(text && text.length > 5) { // 過濾掉太短的雜訊
                        paragraphs += `<p>${text}</p>\n                `;
                    }
                });

                // 生成最終模板
                const finalHTML = `<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>${title} | Ⲙ𝔬ⲃ¡ⳝ𝔭ⲁ𝔠ⲉ</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #000; color: #fff; line-height: 1.8; margin: 0; }
        .article-container { max-width: 480px; margin: 0 auto; padding: 50px 20px; }
        .post-content p { margin-bottom: 25px; text-align: justify; font-size: 18px; }
    </style>
</head>
<body>
    <div class="article-container">
        <h1 style="font-size:26px;">${title}</h1>
        <div class="post-content">
                ${paragraphs}
        </div>
    </div>
</body>
</html>`;

                document.getElementById('resTitle').value = title;
                document.getElementById('resCode').value = finalHTML;
                document.getElementById('resultArea').style.display = 'block';
                btn.innerText = "🔍 重新抓取";
            } catch (e) {
                alert('抓取失敗，可能是該網站封鎖了代理請求。');
                btn.innerText = "🔍 重試";
            } finally {
                btn.disabled = false;
            }
        }

        function copyCode() {
            const code = document.getElementById('resCode');
            code.select();
            document.execCommand('copy');
            document.getElementById('status').innerText = "✅ 已複製！現在可以去 GitHub 貼上了";
        }
    </script>
</body>
</html>
