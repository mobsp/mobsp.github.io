<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ⲙ𝔬ⲃ¡ⳝ𝔭ⲁ𝔠ⲉ | 終極封裝系統</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #00cec9; --danger: #ff4d4d; --ios-bg: #050508; }
        body { background: var(--ios-bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding: 20px; }
        .glass-bg { position: fixed; inset: 0; background: radial-gradient(circle at 20% 30%, #1a1a2e 0%, #000 70%); z-index: -1; }
        .container { max-width: 600px; margin: 0 auto; padding-top: 20px; }
        .tool-card { background: rgba(28, 28, 30, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); padding: 25px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h2 { text-align: center; letter-spacing: 2px; background: linear-gradient(90deg, var(--accent), #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        textarea { width: 100%; padding: 15px; background: rgba(0,0,0,0.4); border: 1px solid #333; color: var(--accent); border-radius: 15px; font-size: 16px; margin-bottom: 15px; outline: none; transition: 0.3s; }
        textarea:focus { border-color: var(--accent); }
        .glow-btn { width: 100%; padding: 18px; border: none; border-radius: 15px; color: #fff; font-weight: bold; font-size: 17px; background: linear-gradient(45deg, var(--accent), #6c5ce7, var(--danger), var(--accent)); background-size: 300%; animation: move 6s infinite; cursor: pointer; }
        @keyframes move { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        #outputArea { display: none; margin-top: 20px; border-top: 1px solid #333; padding-top: 20px; }
    </style>
</head>
<body>
    <div class="glass-bg"></div>
    <div class="container">
        <div class="tool-card">
            <h2>MOBISPACE</h2>
            <p style="text-align:center; color:#666; font-size:12px; margin-bottom:20px;">🛡️ 旗艦級：固定導覽 + 智能標籤 + 18禁彈窗</p>
            <textarea id="rawInput" rows="12" placeholder="請直接貼上全文 (自動偵測標題、分類與標籤)"></textarea>
            <button class="glow-btn" onclick="buildArticle()">🚀 執行旗艦級封裝</button>

            <div id="outputArea">
                <p style="font-size:12px; color:var(--accent); margin-bottom:10px;">✨ 封裝完成！已加入固定頁首頁尾與閱讀控制面板：</p>
                <textarea id="finalCode" rows="8" readonly onclick="this.select()"></textarea>
                <button onclick="copyCode()" style="background:#fff; color:#000; width:100%; padding:15px; border-radius:15px; font-weight:bold; border:none; cursor:pointer;">📋 複製成品代碼</button>
            </div>
        </div>
    </div>

<script>
// --- 旗艦級擴充關鍵字庫 ---
const NSFW_RE = /亂倫|人妻|熟女|母子|母女|父女|兄妹|姐弟|禁忌|成人|色情|性愛|18禁|porn|adult|nsfw|sex|內射|高潮|抽送|肉棒|陰道|陰莖|乳房|巨乳|調教|奴隸|拘束|SM|凌辱|強姦|強暴|騷麥|自慰|擼管/i;
const FAMILY_RE = /家庭|倫理|家訪|嫂子|岳母|小姨子|姑姑|阿姨|繼母|後媽|養女|公公|婆婆|兒媳|女婿|舅媽|嬸嬸/;
const ROLE_RE = /老師|學生|校長|護士|醫生|警察|犯人|上司|下屬|秘書|女僕|空姐|模特|主播/;
const EMOTION_RE = /暗戀|純愛|虐心|異地|回憶|告白|前男友|前女友/;

function buildArticle() {
    const input = document.getElementById('rawInput').value.trim();
    if(!input) return;

    const lines = input.split('\n').filter(l => l.trim());
    const title = lines[0];
    const isNSFW = NSFW_RE.test(input);
    
    // 智能分類標籤
    let tags = [];
    if(isNSFW) tags.push('R-18');
    if(FAMILY_RE.test(input)) tags.push('倫理禁忌');
    if(ROLE_RE.test(input)) tags.push('身分制服');
    if(/人妻|熟女|少婦/.test(input)) tags.push('人妻熟女');
    if(EMOTION_RE.test(input)) tags.push('情感糾葛');
    if(tags.length === 0) tags.push('故事隨筆');

    const paragraphs = lines.slice(1).map(l => `<p>${l.trim()}</p>`).join('\n                ');

    // --- 旗艦文章模板 (固定頁首尾 + 底部導覽) ---
    const template = `<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>${title} | Ⲙ𝔬ⲃ¡ⳝ𝔭ⲁⲉ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --ios-bg: #000; --text-color: #fff; --font-size: 18px; --accent: #00cec9; --danger: #ff4d4d; --panel-bg: rgba(28, 28, 30, 0.95); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: var(--ios-bg); color: var(--text-color); line-height: 1.8; }
        
        /* 固定頁首 */
        .header-fixed { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; padding: 0 20px; justify-content: space-between; padding-top: env(safe-area-inset-top); height: calc(60px + env(safe-area-inset-top)); }
        .back-link { color: var(--accent); text-decoration: none; font-size: 16px; font-weight: 500; }
        
        /* 文章區域 */
        .main-content { max-width: 500px; margin: 0 auto; padding: calc(80px + env(safe-area-inset-top)) 20px 150px; }
        .post-label { font-size: 12px; color: ${isNSFW ? 'var(--danger)' : 'var(--accent)'}; font-weight: bold; margin-bottom: 10px; display: block; letter-spacing: 1px; }
        h1 { font-size: 28px; font-weight: 800; margin-bottom: 30px; line-height: 1.3; }
        .content-body { font-size: var(--font-size); color: var(--text-color); }
        .content-body p { margin-bottom: 25px; text-align: justify; }

        /* 版權聲明頁尾 */
        .footer-copyright { margin-top: 50px; padding: 30px 0; border-top: 1px solid rgba(255,255,255,0.1); text-align: center; color: #555; font-size: 12px; line-height: 1.6; }

        /* 固定底部導覽 */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: calc(70px + env(safe-area-inset-bottom)); background: rgba(20,20,22,0.95); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.1); z-index: 100; display: flex; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { color: #8e8e93; text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 10px; gap: 5px; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 20px; }

        /* 設定面板 */
        .mobi-panel { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--panel-bg); backdrop-filter: blur(30px); border-radius: 25px 25px 0 0; padding: 30px 20px 60px; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: 1000; border-top: 1px solid rgba(255,255,255,0.1); }
        .mobi-panel.show { transform: translateY(0); }
        .panel-row { margin-bottom: 25px; }
        .panel-label { font-size: 13px; color: #8e8e93; margin-bottom: 12px; display: flex; justify-content: space-between; }
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 4px; background: #333; border-radius: 2px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; background: #fff; border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }

        /* 18禁警示 */
        #gate { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .gate-box { padding: 40px 25px; border: 1px solid var(--danger); border-radius: 30px; background: #0a0000; box-shadow: 0 0 50px rgba(255,77,77,0.2); }
        .gate-btn { background: var(--danger); color: #fff; border: none; padding: 15px 50px; border-radius: 50px; font-weight: bold; margin-top: 30px; }
    </style>
</head>
<body>
    ${isNSFW ? `
    <div id="gate">
        <div class="gate-box">
            <h2 style="color:var(--danger); letter-spacing:2px;">18禁限制內容</h2>
            <p style="color:#666; font-size:14px; margin-top:15px;">本文章包含成人題材，存取前請確認您已滿 18 歲。</p>
            <button class="gate-btn" onclick="document.getElementById('gate').remove()">確認成年並進入</button>
        </div>
    </div>` : ''}

    <header class="header-fixed">
        <a href="/blog/" class="back-link"><i class="fa-solid fa-chevron-left"></i> 返回部落格</a>
        <div style="font-weight:bold; font-size:14px; letter-spacing:1px; color:var(--accent);">Ⲙ𝔬ⲃ¡ⳝ𝔭ⲁⲉ</div>
        <div style="width:50px;"></div> </header>

    <div class="main-content">
        <span class="post-label">${tags.map(t=>'#'+t).join(' ')}</span>
        <h1>${title}</h1>
        <div class="content-body" id="articleBody">
            ${paragraphs}
        </div>

        <footer class="footer-copyright">
            <p>© 2026 Ⲙ𝔬ⲃ¡ⳝ𝔭ⲁⲉ 莫比空間 - 版權所有</p>
            <p style="font-size:10px; opacity:0.5;">所有內容僅供文學交流，嚴禁非法傳播。</p>
        </footer>
    </div>

    <nav class="bottom-nav">
        <a href="/" class="nav-item"><i class="fa-solid fa-house"></i><span>首頁</span></a>
        <a href="/blog/" class="nav-item active"><i class="fa-solid fa-book-open"></i><span>閱讀</span></a>
        <div class="nav-item" onclick="document.getElementById('mobiPanel').classList.add('show')"><i class="fa-solid fa-sliders"></i><span>設定</span></div>
        <a href="/tol/" class="nav-item"><i class="fa-solid fa-screwdriver-wrench"></i><span>工具</span></a>
    </nav>

    <div class="mobi-panel" id="mobiPanel">
        <div class="panel-row" style="display:flex; justify-content:space-between; align-items:center;">
            <span style="font-weight:bold; font-size:18px;">閱讀設定</span>
            <span style="color:var(--accent); cursor:pointer; font-weight:bold;" onclick="document.getElementById('mobiPanel').classList.remove('show')">完成</span>
        </div>
        <div class="panel-row">
            <label class="panel-label">字體顏色 (黑 ↔ 白)</label>
            <input type="range" min="0" max="255" value="255" oninput="updateColor(this.value)">
        </div>
        <div class="panel-row">
            <label class="panel-label">字體大小</label>
            <input type="range" min="15" max="30" value="18" oninput="updateSize(this.value)">
        </div>
    </div>

    <script>
        function updateColor(val) {
            const color = \`rgb(\${val},\${val},\${val})\`;
            document.documentElement.style.setProperty('--text-color', color);
        }
        function updateSize(val) {
            document.documentElement.style.setProperty('--font-size', val + 'px');
        }
    <\/script>
</body>
</html>`;

    document.getElementById('finalCode').value = template;
    document.getElementById('outputArea').style.display = 'block';
}

function copyCode() {
    const el = document.getElementById('finalCode');
    el.select();
    document.execCommand('copy');
    alert('✅ 旗艦版文章代碼已複製！');
}
</script>
</body>
</html>
