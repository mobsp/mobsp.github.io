<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ⲙ𝔬ⲃ¡ⳝ𝔭ⲁ𝔠ⲉ | 智能模板轉換</title>
    <style>
        body { background: #050508; color: #fff; font-family: sans-serif; padding: 15px; }
        .card { background: #1c1c1e; padding: 20px; border-radius: 20px; border: 1px solid #333; max-width: 500px; margin: auto; }
        textarea { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #444; color: #00cec9; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #00cec9; border: none; border-radius: 12px; font-weight: bold; margin-top: 10px; color: #000; }
        .auto-info { display: flex; gap: 10px; margin-top: 10px; }
        .tag-chip { background: #333; padding: 5px 12px; border-radius: 20px; font-size: 12px; color: #00cec9; border: 1px solid #00cec9; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color:#00cec9; margin:0 0 10px 0;">🤖 智能識別轉換</h2>
        <p style="font-size:12px; color:#8e8e93;">直接貼上全文，我會嘗試判斷標題與標籤</p>
        
        <textarea id="rawInput" rows="12" placeholder="請直接貼上整篇文章內容..."></textarea>
        
        <button onclick="smartAnalyze()">🧠 智能分析並生成</button>

        <div id="outputArea" style="display:none; margin-top:20px;">
            <div id="detectedInfo" style="margin-bottom:15px;">
                <label style="font-size:12px; color:#8e8e93;">自動識別結果：</label>
                <div id="tagContainer" class="auto-info"></div>
            </div>
            <textarea id="finalCode" rows="10" readonly></textarea>
            <button onclick="copyCode()" style="background:#fff;">📋 複製代碼</button>
        </div>
    </div>

    <script>
        function smartAnalyze() {
            const input = document.getElementById('rawInput').value.trim();
            if(!input) return alert('部長，內容是空的喔！');

            const lines = input.split('\n').filter(l => l.trim() !== '');
            
            // 1. 自動判斷標題：通常第一行就是標題，或最長的那行
            let title = lines[0].length < 50 ? lines[0] : "未命名文章";
            
            // 2. 自動分析標籤 (簡單關鍵字法)
            const tags = [];
            const textContent = input.toLowerCase();
            if(textContent.includes('js') || textContent.includes('code')) tags.push('技術');
            if(textContent.includes('生活') || textContent.includes('今天')) tags.push('生活');
            if(textContent.includes('夢') || textContent.includes('深海')) tags.push('隨筆');
            if(tags.length === 0) tags.push('一般');

            // 顯示標籤給部長看
            const tagContainer = document.getElementById('tagContainer');
            tagContainer.innerHTML = tags.map(t => `<span class="tag-chip"># ${t}</span>`).join('');

            // 3. 生成段落
            const paragraphs = lines.slice(1).map(line => `<p>${line.trim()}</p>`).join('\n                ');

            // 4. 套用模板 (加入標籤 Meta)
            const template = `<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="keywords" content="${tags.join(',')}">
    <title>${title} | Ⲙ𝔬ⲃ¡ⳝ𝔭ⲁ𝔠ⲉ</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #000; color: #fff; line-height: 1.8; margin: 0; }
        .article-container { max-width: 480px; margin: 0 auto; padding: 50px 20px; }
        .tag-list { color: #00cec9; font-size: 14px; margin-bottom: 10px; }
        .post-content p { margin-bottom: 25px; text-align: justify; font-size: 18px; }
    </style>
</head>
<body>
    <div class="article-container">
        <div class="tag-list">${tags.map(t => '#' + t).join(' ')}</div>
        <h1 style="font-size:26px;">${title}</h1>
        <div class="post-content">
                ${paragraphs}
        </div>
    </div>
</body>
</html>`;

            document.getElementById('finalCode').value = template;
            document.getElementById('outputArea').style.display = 'block';
        }

        function copyCode() {
            const code = document.getElementById('finalCode');
            code.select();
            document.execCommand('copy');
            alert('✅ 智能轉換完成！代碼已複製。');
        }
    </script>
</body>
</html>
