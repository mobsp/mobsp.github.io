<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ⲙ𝔬ⲃ¡ⳝ𝔭ⲁ𝔠ⲉ | 終極 App 封裝</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #00cec9; --danger: #ff4d4d; --ios-bg: #000; }
        /* 核心防晃動與 App 化 CSS */
        html, body { 
            height: 100%; 
            overflow: hidden; /* 鎖死主視窗，防止橡皮筋亂晃 */
            background: #000; 
            -webkit-user-select: none; /* 防止誤觸選取文字（閱讀區除外） */
        }
        body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; }
        
        /* 毛玻璃背景層 */
        .glass-bg { position: fixed; inset: 0; background: radial-gradient(circle at 20% 30%, #1a1a2e 0%, #000 70%); z-index: -1; }
        
        /* 轉換器卡片容器 */
        .app-main { 
            flex: 1; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch; 
            padding: 20px; 
            padding-bottom: 120px;
        }
        .tool-card { 
            background: rgba(28, 28, 30, 0.7); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.1); 
            padding: 25px; 
            border-radius: 35px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            max-width: 500px; 
            margin: 0 auto;
        }

        h2 { text-align: center; letter-spacing: 2px; background: linear-gradient(90deg, var(--accent), #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        textarea { width: 100%; padding: 15px; background: rgba(0,0,0,0.4); border: 1px solid #333; color: var(--accent); border-radius: 20px; font-size: 16px; margin-bottom: 15px; outline: none; border: 1px solid rgba(255,255,255,0.15); }
        .glow-btn { width: 100%; padding: 18px; border: none; border-radius: 20px; color: #fff; font-weight: bold; font-size: 17px; background: linear-gradient(45deg, var(--accent), #6c5ce7, var(--danger), var(--accent)); background-size: 300%; animation: move 6s infinite; cursor: pointer; box-shadow: 0 10px 20px rgba(0,206,201,0.2); }
        @keyframes move { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        #outputArea { display: none; margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
    </style>
</head>
<body>
    <div class="glass-bg"></div>
    <div class="app-main">
        <div class="tool-card">
            <h2>MOBISPACE</h2>
            <p style="text-align:center; color:#666; font-size:12px; margin-bottom:20px;">🛡️ 原生 App 封裝技術 (防止滑動晃動)</p>
            <textarea id="rawInput" rows="12" placeholder="貼上全文..."></textarea>
            <button class="glow-btn" onclick="buildArticle()">🚀 封裝為原生 App 體驗</button>
            <div id="outputArea">
                <textarea id="finalCode" rows="6" readonly onclick="this.select()"></textarea>
                <button onclick="copyCode()" style="background:#fff; color:#000; width:100%; padding:15px; border-radius:20px; font-weight:bold; border:none; margin-top:10px;">📋 複製成品代碼</button>
            </div>
        </div>
    </div>

<script>
const NSFW_RE = /亂倫|人妻|熟女|母子|母女|父女|兄妹|姐弟|禁忌|成人|色情|性愛|18禁|porn|adult|nsfw|sex|內射|高潮|抽送|肉棒|陰道|陰莖|乳房|巨乳|調教|奴隸|拘束|SM|凌辱|強姦|強暴|騷麥|自慰|擼管/i;
const FAMILY_RE = /家庭|倫理|家訪|嫂子|岳母|小姨子|姑姑|阿姨|繼母|後媽|養女|公公|婆婆|兒媳|女婿|舅媽|嬸嬸/;

function buildArticle() {
    const input = document.getElementById('rawInput').value.trim();
    if(!input) return;
    const lines = input.split('\n').filter(l => l.trim());
    const title = lines[0];
    const isNSFW = NSFW_RE.test(input);
    let tags = isNSFW ? ['R-18'] : [];
    if(FAMILY_RE.test(input)) tags.push('倫理禁忌');
    if(/人妻|熟女/.test(input)) tags.push('人妻熟女');
    const paragraphs = lines.slice(1).map(l => `<p>${l.trim()}</p>`).join('\n                ');

    // --- 生成的成品代碼：極致防晃動 App 模板 ---
    const template = `<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>\${title}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --ios-bg: #000; --text-color: #fff; --font-size: 18px; --accent: #00cec9; --danger: #ff4d4d; }
        /* 強制 App 化視窗 */
        html, body { 
            height: 100%; width: 100%; 
            margin: 0; padding: 0; 
            overflow: hidden; /* 徹底禁止全頁回彈晃動 */
            background: #000; 
            position: fixed; /* 鎖死背景防止下拉刷新 */
        }
        body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; }
        .glass-bg { position: fixed; inset: 0; background: radial-gradient(circle at 20% 30%, #1a1a2e 0%, #000 70%); z-index: -1; }
        
        /* 固定頁首 */
        header { 
            height: calc(55px + env(safe-area-inset-top)); 
            padding-top: env(safe-area-inset-top);
            background: rgba(10,10,10,0.85); 
            backdrop-filter: blur(20px); 
            display: flex; align-items: center; justify-content: space-between; 
            padding-left: 20px; padding-right: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }
        
        /* 可滾動閱讀區 (真正有阻尼感的地方) */
        .scroller { 
            flex: 1; 
            overflow-y: scroll; 
            -webkit-overflow-scrolling: touch; /* iOS 加速滾動 */
            padding: 25px 20px 150px;
            overscroll-behavior-y: contain; /* 關鍵：防止滾動溢出到父層 */
        }
        .scroller::-webkit-scrollbar { display: none; } /* 隱藏捲軸 */

        .article-main { max-width: 500px; margin: 0 auto; }
        .post-label { font-size: 12px; color: \${isNSFW ? 'var(--danger)' : 'var(--accent)'}; font-weight: bold; margin-bottom: 8px; display: block; }
        h1 { font-size: 28px; font-weight: 800; margin-bottom: 25px; line-height: 1.3; }
        .content-body { font-size: var(--font-size); color: var(--text-color); -webkit-user-select: text; }
        .content-body p { margin-bottom: 25px; text-align: justify; }

        /* 固定底部導覽列 */
        .bottom-bar { 
            height: calc(65px + env(safe-area-inset-bottom));
            padding-bottom: env(safe-area-inset-bottom);
            background: rgba(15,15,15,0.95); 
            backdrop-filter: blur(25px); 
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid rgba(255,255,255,0.08);
            z-index: 100;
        }
        .nav-item { color: #8e8e93; font-size: 10px; text-align: center; text-decoration: none; display: flex; flex-direction: column; gap: 4px; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 22px; }

        /* 設定面板 (iOS 風格抽屜) */
        .panel { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(30,30,32,0.98); backdrop-filter: blur(30px); border-radius: 25px 25px 0 0; padding: 25px 20px 50px; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.2, 1, 0.2, 1); z-index: 1000; border-top: 1px solid rgba(255,255,255,0.1); }
        .panel.show { transform: translateY(0); }
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 4px; background: #444; border-radius: 2px; margin: 15px 0; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 26px; height: 26px; background: #fff; border-radius: 50%; box-shadow: 0 3px 8px rgba(0,0,0,0.4); }

        /* 警示彈窗 */
        #gate { position: fixed; inset: 0; background: #000; z-index: 20000; display: flex; align-items: center; justify-content: center; text-align: center; }
        .gate-box { padding: 40px 20px; border: 1px solid var(--danger); border-radius: 30px; background: #0a0000; width: 85%; }
        .gate-btn { background: var(--danger); color: #fff; border: none; padding: 15px 60px; border-radius: 50px; font-weight: bold; margin-top: 25px; }
    </style>
</head>
<body>
    <div class="glass-bg"></div>
    \${isNSFW ? \`
    <div id="gate">
        <div class="gate-box">
            <h2 style="color:var(--danger)">RESTRICTED</h2>
            <p style="color:#666; font-size:14px; margin-top:10px;">本內容涉及成人題材，請確認您已成年。</p>
            <button class="gate-btn" onclick="document.getElementById('gate').remove()">確認成年並進入</button>
        </div>
    </div>\` : ''}

    <header>
        <a href="/blog/" style="color:var(--accent); text-decoration:none; font-size:17px;"><i class="fa-solid fa-chevron-left"></i> 返回</a>
        <span style="font-weight:700; font-size:15px; letter-spacing:1px;">Ⲙ𝔬ⲃ¡ⳝ𝔭ⲁⲉ</span>
        <div style="width:40px;"></div>
    </header>

    <div class="scroller">
        <div class="article-main">
            <span class="post-label">\${tags.map(t=>'#'+t).join(' ')}</span>
            <h1>\${title}</h1>
            <div class="content-body">
                \${paragraphs}
            </div>
            <div style="text-align:center; padding:40px 0; color:#444; font-size:11px; border-top:1px solid #222; margin-top:50px;">
                © 2026 Ⲙ𝔬ⲃ¡ⳝ𝔭ⲁⲉ 莫比空間<br>ALL RIGHTS RESERVED
            </div>
        </div>
    </div>

    <nav class="bottom-bar">
        <a href="/" class="nav-item"><i class="fa-solid fa-house-chimney"></i><span>首頁</span></a>
        <a href="/blog/" class="nav-item active"><i class="fa-solid fa-book-open"></i><span>閱讀</span></a>
        <div class="nav-item" onclick="document.getElementById('setPanel').classList.add('show')"><i class="fa-solid fa-sliders"></i><span>設定</span></div>
        <a href="/tol/" class="nav-item"><i class="fa-solid fa-screwdriver-wrench"></i><span>工具</span></a>
    </nav>

    <div class="panel" id="setPanel">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px; align-items:center;">
            <span style="font-weight:bold; font-size:19px;">閱讀設定</span>
            <span style="color:var(--accent); font-weight:bold; cursor:pointer;" onclick="document.getElementById('setPanel').classList.remove('show')">完成</span>
        </div>
        <div style="margin-bottom:20px;">
            <label style="color:#8e8e93; font-size:13px;">字體顏色 (黑 ↔ 白)</label>
            <input type="range" min="0" max="255" value="255" oninput="document.documentElement.style.setProperty('--text-color', 'rgb('+this.value+','+this.value+','+this.value+')')">
        </div>
        <div>
            <label style="color:#8e8e93; font-size:13px;">字體大小</label>
            <input type="range" min="15" max="32" value="18" oninput="document.documentElement.style.setProperty('--font-size', this.value+'px')">
        </div>
    </div>
</body>
</html>`;

    document.getElementById('finalCode').value = template.replace('${title}', title).replace('${isNSFW}', isNSFW).replace('${tags.map(t=>\'#\'+t).join(\' \')}', tags.map(t=>'#'+t).join(' ')).replace('${paragraphs}', paragraphs);
    document.getElementById('outputArea').style.display = 'block';
}

function copyCode() {
    const el = document.getElementById('finalCode');
    el.select();
    document.execCommand('copy');
    alert('✅ 原生 App 質感代碼已複製！');
}
</script>
</body>
</html>
