<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobispace | 資源鏡像清單</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #000 20%, #1a0b2e 50%, #000 80%);
            --accent-color: #00f2fe;
            --card-bg: rgba(20, 20, 20, 0.8);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: #8e8e93;
            --glow-effect: 0 0 15px rgba(0, 242, 254, 0.4);
        }

        @keyframes rainbow-flow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }

        body {
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: rainbow-flow 10s ease infinite;
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }

        .header { text-align: center; margin-bottom: 40px; padding-top: 20px; }
        .header h1 { 
            font-size: 26px; 
            letter-spacing: 3px;
            background: linear-gradient(to right, #fff, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .table-container {
            max-width: 1200px;
            margin: 0 auto 100px;
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: var(--glow-effect);
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; }
        th { 
            background: rgba(255,255,255,0.05); 
            color: var(--accent-color); 
            text-align: left; 
            padding: 18px; 
            font-size: 11px; 
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-color);
        }
        td { padding: 14px 18px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 13px; }

        .type-tag { font-weight: 800; color: var(--accent-color); width: 80px; }
        .link-url a { color: var(--text-secondary); text-decoration: none; transition: 0.2s; }
        .link-url a:hover { color: var(--accent-color); text-shadow: var(--glow-effect); }
        code { color: #00ff88; background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 4px; font-size: 11px; }

        @media (max-width: 850px) {
            .repo-path { display: none; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>RESOURCE MIRROR</h1>
        <div style="font-size: 10px; color: var(--text-secondary); margin-top: 5px;">Automatic Cloud Indexing System</div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Format</th>
                    <th>Identifier</th>
                    <th>Public Endpoint</th>
                    <th class="repo-path">Internal Path</th>
                </tr>
            </thead>
            <tbody>
</tbody>
        </table>
    </div>
</body>
</html>
