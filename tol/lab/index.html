<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ⲙ𝔬ⲃⳝ𝔭 | WEB APP 功能元件庫</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        :root { --accent: #00cec9; --bg-light: #f8fafc; --bg-dark: #0f172a; }
        body { font-family: -apple-system, sans-serif; background: var(--bg-light); overflow: hidden; }
        .dark-mode { background: var(--bg-dark); color: #f1f5f9; }
        
        .sidebar { transition: transform 0.3s ease; z-index: 1000; }
        .glass-sidebar { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .dark-mode .glass-sidebar { background: rgba(15, 23, 42, 0.8); border-color: #1e293b; }
        
        .active-item { border-left: 4px solid var(--accent); background: rgba(0, 206, 201, 0.1); color: var(--accent); font-weight: 700; }
        
        /* 內容區捲動優化 */
        .main-content { scroll-behavior: smooth; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark-mode .custom-scroll::-webkit-scrollbar-thumb { background: #334155; }

        .brand-glow { text-shadow: 0 0 15px rgba(0, 206, 201, 0.2); }
    </style>
</head>
<body class="transition-colors duration-500">

<div id="app" class="flex h-screen w-full relative overflow-hidden">
    
    <div v-if="showMenu" @click="showMenu = false" class="fixed inset-0 bg-black/60 z-[900] lg:hidden"></div>

    <aside :class="['sidebar fixed lg:static w-[280px] h-full glass-sidebar border-r dark:border-slate-800 flex flex-col', 
                   showMenu ? 'translate-x-0' : '-translate-x-full lg:translate-x-0']">
        <div class="p-6 border-b dark:border-slate-800">
            <h1 class="text-xl font-black text-slate-900 dark:text-white">Ⲙ𝔬ⲃⳝ𝔭 <span class="text-[var(--accent)]">LAB</span></h1>
            <p class="text-[9px] text-slate-400 font-bold tracking-[0.2em] mt-1">CORE MATRIX 250+</p>
        </div>
        
        <div class="flex-1 overflow-y-auto p-4 custom-scroll">
            <div v-for="(group, key) in categories" :key="key" class="mb-6">
                <h3 class="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-3 px-2">
                    {{ group.title || key }}
                </h3>
                <div v-for="item in group.items" :key="item.id" 
                     @click="selectItem(item)"
                     class="p-3 mb-1 rounded-xl cursor-pointer transition-all flex items-center gap-3 text-sm"
                     :class="activeItem?.id === item.id ? 'active-item' : 'text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800/50'">
                    <span class="text-[9px] font-mono opacity-40">{{ item.id }}</span>
                    <span class="truncate">{{ item.name }}</span>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full bg-slate-50 dark:bg-slate-950 overflow-hidden">
        
        <div class="absolute top-4 right-4 z-20 flex gap-2">
            <button @click="toggleDark" class="w-10 h-10 rounded-2xl bg-white/80 dark:bg-slate-800/80 backdrop-blur-md shadow-sm border dark:border-slate-700 flex items-center justify-center">
                {{ isDark ? '🌙' : '☀️' }}
            </button>
            <button @click="showMenu = true" class="lg:hidden w-10 h-10 rounded-2xl bg-white/80 dark:bg-slate-800/80 backdrop-blur-md shadow-sm border flex items-center justify-center text-slate-500">
                ☰
            </button>
        </div>

        <div id="content-viewport" class="main-content flex-1 overflow-y-auto custom-scroll p-4 lg:p-10">
            
            <header class="py-12 lg:py-20 text-center transition-all" :class="activeItem ? 'opacity-40 scale-95' : 'opacity-100'">
                <h1 class="brand-glow text-3xl lg:text-4xl font-black mb-4">
                    <span style="color: var(--accent);">Ⲙ𝔬ⲃⳝ𝔭</span> 
                    <span class="dark:text-white"> | WEB APP 功能元件庫</span>
                </h1>
                <p class="text-slate-400 text-xs lg:text-sm font-bold tracking-[0.3em] uppercase">
                    Core Matrix Components - 核心矩陣組件 [250+]
                </p>
                <div class="mt-6 flex justify-center"><div class="h-1 w-16 bg-[var(--accent)] rounded-full opacity-30"></div></div>
            </header>

            <div v-if="activeItem" id="preview-section" class="max-w-4xl mx-auto space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
                
                <div class="bg-white dark:bg-slate-900 rounded-[2.5rem] p-6 lg:p-10 shadow-2xl shadow-slate-200/50 dark:shadow-none border border-slate-100 dark:border-slate-800">
                    <div class="mb-6 flex items-center justify-between border-b dark:border-slate-800 pb-4">
                        <div class="flex items-center gap-3">
                            <span class="px-2 py-1 bg-[var(--accent)] text-white text-[10px] font-black rounded-lg">{{ activeItem.id }}</span>
                            <h2 class="text-xl font-bold dark:text-white">{{ activeItem.name }}</h2>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="w-2 h-2 rounded-full bg-green-500"></span>
                            <span class="text-[10px] font-bold text-slate-400">ACTIVE</span>
                        </div>
                    </div>
                    
                    <div class="relative min-h-[250px] bg-slate-50 dark:bg-slate-950/50 rounded-[2rem] p-8 border-2 border-dashed border-slate-200 dark:border-slate-800 flex items-center justify-center overflow-auto"
                         v-html="activeItem.code">
                    </div>
                    
                    <div class="mt-8 p-6 bg-slate-100/50 dark:bg-slate-800/30 rounded-2xl border border-slate-200/50 dark:border-slate-700/50">
                        <p class="text-sm text-slate-600 dark:text-slate-400 leading-relaxed">
                            <strong class="text-[var(--accent)] mr-2 font-black">DEFINITION</strong> {{ activeItem.desc }}
                        </p>
                    </div>
                </div>

                <div class="bg-slate-900 rounded-[2rem] p-6 border border-slate-800 shadow-2xl relative overflow-hidden">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-[10px] text-slate-500 font-black tracking-widest font-mono">SOURCE CODE</span>
                        <button @click="copyCode" class="text-[10px] font-bold bg-slate-800 text-slate-300 px-4 py-2 rounded-xl hover:bg-[var(--accent)] hover:text-white transition-all active:scale-95">
                            {{ copyStatus }}
                        </button>
                    </div>
                    <pre class="text-[var(--accent)] text-xs lg:text-sm leading-relaxed overflow-x-auto p-4 custom-scroll"><code>{{ activeItem.code }}</code></pre>
                </div>
            </div>

            <div v-else class="py-20 text-center text-slate-300 dark:text-slate-800">
                <div class="text-9xl font-black opacity-10 mb-4 select-none">Ⲙ𝔬ⲃⳝ𝔭</div>
                <p class="tracking-[0.5em] font-bold">請選取左側功能元開始</p>
            </div>

        </div>
    </main>
</div>

<script>
    const { createApp, ref, onMounted, nextTick } = Vue;

    createApp({
        setup() {
            const categories = ref({});
            const activeItem = ref(null);
            const isDark = ref(false);
            const showMenu = ref(false);
            const copyStatus = ref('COPY');

            onMounted(async () => {
                try {
                    const res = await fetch('../data/config.json');
                    const data = await res.json();
                    categories.value = data.site_structure || data;
                } catch (e) {
                    console.error("JSON Error", e);
                }
            });

            const selectItem = async (item) => {
                activeItem.value = item;
                showMenu.value = false;
                if (navigator.vibrate) navigator.vibrate(10);
                
                // 【核心優化】選中後自動捲動到展示區域，避免被標題擋住
                await nextTick();
                const section = document.getElementById('preview-section');
                if(section) {
                    section.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            };

            const toggleDark = () => {
                isDark.value = !isDark.value;
                document.body.classList.toggle('dark-mode');
            };

            const copyCode = () => {
                navigator.clipboard.writeText(activeItem.value.code);
                copyStatus.value = 'COPIED!';
                setTimeout(() => copyStatus.value = 'COPY', 2000);
            };

            return { categories, activeItem, isDark, showMenu, toggleDark, selectItem, copyCode, copyStatus };
        }
    }).mount('#app');
</script>
</body>
</html>
