<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ⲙ𝔬ⲃⳝ𝔭 | WEB APP 功能元件庫</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        :root { --line-green: #06C755; --accent: #00cec9; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8fafc; overflow: hidden; }
        .dark-mode { background: #0f172a; color: #f1f5f9; }
        
        /* 側邊欄平滑動畫 */
        .sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; }
        .glass-sidebar { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .dark-mode .glass-sidebar { background: rgba(15, 23, 42, 0.9); border-color: #1e293b; }
        
        /* 選項啟動樣式 */
        .active-item { border-left: 4px solid var(--accent); background: rgba(0, 206, 201, 0.1); color: var(--accent); font-weight: 600; }
        
        /* 滾動條美化 */
        .custom-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark-mode .custom-scroll::-webkit-scrollbar-thumb { background: #334155; }

        /* 標題發光效果 */
        .brand-glow { text-shadow: 0 0 15px rgba(0, 206, 201, 0.3); }
        .dark-mode .brand-glow { text-shadow: 0 0 20px rgba(0, 206, 201, 0.5); }
    </style>
</head>
<body class="transition-colors duration-500">

<div id="app" class="flex h-screen w-full relative overflow-hidden">
    
    <div v-if="showMenu" @click="showMenu = false" class="fixed inset-0 bg-black/60 z-[900] lg:hidden backdrop-blur-sm"></div>

    <aside :class="['sidebar fixed lg:static w-[280px] h-full glass-sidebar border-r dark:border-slate-800 flex flex-col', 
                   showMenu ? 'translate-x-0' : '-translate-x-full lg:translate-x-0']">
        <div class="p-6 border-b dark:border-slate-800">
            <h1 class="text-xl font-black tracking-tighter text-slate-900 dark:text-white">
                <span class="text-[var(--accent)]">Ⲙ𝔬ⲃⳝ𝔭</span> | LAB
            </h1>
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Matrix Dictionary</p>
        </div>
        
        <div class="flex-1 overflow-y-auto p-4 custom-scroll">
            <div v-for="(group, key) in categories" :key="key" class="mb-8">
                <h3 class="text-[11px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-[0.2em] mb-4 px-2">
                    {{ group.title || key }}
                </h3>
                <div v-for="item in group.items" :key="item.id" 
                     @click="selectItem(item)"
                     class="p-3 mb-1 rounded-xl cursor-pointer transition-all flex items-center gap-3 group"
                     :class="activeItem?.id === item.id ? 'active-item' : 'text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800/50 text-sm'">
                    <span class="text-[9px] font-mono opacity-40 group-hover:opacity-100 transition-opacity">{{ item.id }}</span>
                    <span class="truncate">{{ item.name }}</span>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col w-full h-full overflow-hidden bg-slate-50 dark:bg-slate-950">
        
        <div class="absolute top-4 right-4 z-20 flex gap-2">
            <button @click="toggleDark" class="w-10 h-10 rounded-xl bg-white/50 dark:bg-slate-800/50 backdrop-blur-md shadow-sm flex items-center justify-center text-lg hover:scale-105 transition-transform">
                {{ isDark ? '🌙' : '☀️' }}
            </button>
            <button @click="showMenu = true" class="lg:hidden w-10 h-10 rounded-xl bg-white/50 dark:bg-slate-800/50 backdrop-blur-md shadow-sm flex items-center justify-center text-slate-500">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto custom-scroll">
            
            <header style="text-align: center; padding: 60px 20px 40px 20px;">
                <h1 class="brand-glow" style="font-size: 28px; letter-spacing: 1px; margin-bottom: 8px; font-weight: 900;">
                    <span style="color: var(--accent);">Ⲙ𝔬ⲃⳝ𝔭</span> 
                    <span class="dark:text-white"> | WEB APP 功能元件庫</span>
                </h1>
                <p style="color: #888; font-size: 14px; letter-spacing: 2px; font-weight: 600; text-transform: uppercase;">
                    CORE MATRIX COMPONENTS - 核心矩陣組件 [250+]
                </p>
                <div class="mt-4 flex justify-center">
                    <div class="h-1 w-20 bg-gradient-to-r from-transparent via-[var(--accent)] to-transparent opacity-50"></div>
                </div>
            </header>

            <div v-if="activeItem" class="max-w-4xl mx-auto p-4 lg:p-10 space-y-8 pb-[env(safe-area-inset-bottom)]">
                
                <div class="bg-white dark:bg-slate-900 rounded-[2.5rem] p-6 lg:p-10 shadow-2xl shadow-slate-200/50 dark:shadow-none border border-slate-100 dark:border-slate-800">
                    <div class="mb-6 flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] bg-[var(--accent)] text-white px-2 py-0.5 rounded font-bold">{{ activeItem.id }}</span>
                            <h2 class="font-bold text-slate-800 dark:text-slate-100">{{ activeItem.name }}</h2>
                        </div>
                    </div>
                    
                    <div class="flex items-center justify-center min-h-[200px] bg-slate-50 dark:bg-slate-950/50 rounded-[2rem] p-8 border-2 border-dashed border-slate-200 dark:border-slate-800 overflow-hidden" 
                         v-html="activeItem.code">
                    </div>
                    
                    <div class="mt-8 p-6 bg-slate-50 dark:bg-slate-800/50 rounded-2xl">
                        <p class="text-sm text-slate-500 dark:text-slate-400 leading-relaxed italic">
                            {{ activeItem.desc }}
                        </p>
                    </div>
                </div>

                <div class="bg-slate-900 rounded-[2rem] p-6 relative group border border-slate-800 shadow-2xl">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-[10px] text-slate-500 font-black tracking-widest font-mono">SOURCE CODE</span>
                        <button @click="copyCode" class="text-[10px] font-bold bg-slate-800 text-slate-300 px-4 py-2 rounded-xl hover:bg-[var(--accent)] hover:text-white transition-all active:scale-95">
                            {{ copyStatus }}
                        </button>
                    </div>
                    <pre class="text-[var(--accent)] text-xs lg:text-sm leading-relaxed overflow-x-auto py-4"><code>{{ activeItem.code }}</code></pre>
                </div>

            </div>

            <div v-else class="h-[400px] flex flex-col items-center justify-center text-slate-300 dark:text-slate-800">
                <div class="text-9xl mb-6 opacity-10 font-black">Matrix</div>
                <p class="text-sm tracking-[0.5em] font-bold text-slate-400">請從左側選單探索元件</p>
            </div>
        </div>
    </main>
</div>

<script>
    const { createApp, ref, onMounted } = Vue;

    createApp({
        setup() {
            const categories = ref({});
            const activeItem = ref(null);
            const isDark = ref(false);
            const showMenu = ref(false);
            const copyStatus = ref('COPY');

            onMounted(async () => {
                try {
                    const res = await fetch('../data/config.json');
                    const data = await res.json();
                    // 修正：穿透 site_structure
                    categories.value = data.site_structure || data;
                    console.log("✅ Ⲙ𝔬ⲃⳝ𝔭 Data Connected");
                } catch (e) {
                    console.error("❌ JSON Error", e);
                }
            });

            const selectItem = (item) => {
                activeItem.value = item;
                showMenu.value = false;
                if (navigator.vibrate) navigator.vibrate(10);
            };

            const toggleDark = () => {
                isDark.value = !isDark.value;
                document.body.classList.toggle('dark-mode');
            };

            const copyCode = () => {
                navigator.clipboard.writeText(activeItem.value.code);
                copyStatus.value = 'COPIED!';
                setTimeout(() => copyStatus.value = 'COPY', 2000);
            };

            return { categories, activeItem, isDark, showMenu, toggleDark, selectItem, copyCode, copyStatus };
        }
    }).mount('#app');
</script>
</body>
</html>
