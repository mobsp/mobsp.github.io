<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TITILab 250+ 實驗室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        :root { --line-green: #06C755; }
        body { font-family: -apple-system, sans-serif; background: #f8fafc; overflow: hidden; }
        .dark-mode { background: #0f172a; color: #f1f5f9; }
        /* 側邊欄動畫 */
        .sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; }
        .glass-sidebar { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .dark-mode .glass-sidebar { background: rgba(15, 23, 42, 0.9); }
        .active-item { border-left: 4px solid var(--line-green); background: rgba(6, 199, 85, 0.1); color: var(--line-green); }
        /* 程式碼區塊滾動條 */
        .custom-code::-webkit-scrollbar { height: 4px; }
        .custom-code::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
    </style>
</head>
<body class="transition-colors duration-500">

<div id="app" class="flex h-screen w-full relative overflow-hidden">
    
    <div v-if="showMenu" @click="showMenu = false" class="fixed inset-0 bg-black/50 z-[900] lg:hidden"></div>

    <aside :class="['sidebar fixed lg:static w-[280px] h-full glass-sidebar border-r dark:border-gray-800', 
                   showMenu ? 'translate-x-0' : '-translate-x-full lg:translate-x-0']">
        <div class="p-6 border-b dark:border-gray-800 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black text-green-600">TITILab</h1>
                <p class="text-[10px] text-gray-400">250 項功能元字典 v1.0</p>
            </div>
            <button @click="showMenu = false" class="lg:hidden text-gray-400">✕</button>
        </div>
        
        <div class="flex-1 overflow-y-auto p-4 h-[calc(100vh-100px)]">
            <div v-for="(group, key) in categories" :key="key" class="mb-6">
                <h3 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-3 px-2">{{ key }}</h3>
                <div v-for="item in group.items" :key="item.id" 
                     @click="selectItem(item)"
                     class="p-3 mb-1 rounded-xl cursor-pointer transition-all flex items-center gap-3"
                     :class="activeItem?.id === item.id ? 'active-item' : 'text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 text-sm'">
                    <span class="text-[9px] font-mono opacity-40">{{ item.id }}</span>
                    <span class="truncate">{{ item.name }}</span>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col w-full h-full overflow-hidden bg-gray-50 dark:bg-slate-900">
        <header class="h-16 flex items-center justify-between px-4 lg:px-8 border-b dark:border-gray-800 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md z-10 pt-[env(safe-area-inset-top)]">
            <div class="flex items-center gap-3">
                <button @click="showMenu = true" class="lg:hidden p-2 text-gray-500">☰</button>
                <div v-if="activeItem" class="flex flex-col">
                    <span class="text-[9px] text-green-500 font-bold uppercase tracking-tighter">{{ activeItem.id }}</span>
                    <h2 class="font-bold text-sm lg:text-base truncate max-w-[150px] lg:max-w-none">{{ activeItem.name }}</h2>
                </div>
                <h2 v-else class="font-bold">請選擇項目</h2>
            </div>
            <button @click="toggleDark" class="w-10 h-10 rounded-xl bg-gray-100 dark:bg-gray-800 flex items-center justify-center text-lg">
                {{ isDark ? '🌙' : '☀️' }}
            </button>
        </header>

        <div class="flex-1 overflow-y-auto p-4 lg:p-10 pb-[env(safe-area-inset-bottom)]">
            <div v-if="activeItem" class="max-w-3xl mx-auto space-y-6">
                
                <div class="bg-white dark:bg-slate-800 rounded-3xl p-6 lg:p-10 shadow-xl shadow-slate-200/50 dark:shadow-none border dark:border-gray-700">
                    <div class="mb-4 flex items-center justify-between">
                        <span class="text-xs font-bold text-gray-400">LIVE PREVIEW</span>
                        <span class="text-[10px] bg-green-100 text-green-600 px-2 py-0.5 rounded-full">運行中</span>
                    </div>
                    <div class="flex items-center justify-center min-h-[150px] bg-slate-50 dark:bg-slate-900/50 rounded-2xl p-4 overflow-hidden" v-html="activeItem.code"></div>
                    <p class="mt-6 text-sm text-gray-500 italic">{{ activeItem.desc }}</p>
                </div>

                <div class="bg-slate-900 rounded-2xl p-5 relative group border border-slate-700">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-[10px] text-slate-500 font-mono">SOURCE CODE</span>
                        <button @click="copyCode" class="text-[10px] bg-slate-700 text-slate-300 px-3 py-1 rounded-lg hover:bg-green-600 hover:text-white transition">
                            {{ copyStatus }}
                        </button>
                    </div>
                    <pre class="text-green-400 font-mono text-xs leading-relaxed overflow-x-auto custom-code py-2"><code>{{ activeItem.code }}</code></pre>
                </div>
            </div>

            <div v-else class="h-full flex flex-col items-center justify-center text-gray-400">
                <div class="text-6xl mb-4 opacity-20">🧪</div>
                <p>點擊左上角選單開始探索</p>
            </div>
        </div>
    </main>
</div>

<script>
    const { createApp, ref, onMounted } = Vue;

    createApp({
        setup() {
            const categories = ref({});
            const activeItem = ref(null);
            const isDark = ref(false);
            const showMenu = ref(false);
            const copyStatus = ref('COPY');

            onMounted(async () => {
                try {
                    // [重要] 路徑對準 ../data/config.json
                    const res = await fetch('../data/config.json');
                    if (!res.ok) throw new Error();
                    categories.value = await res.json();
                } catch (e) {
                    alert("找不到 config.json！請確保檔案放在正確資料夾下。");
                }
            });

            const selectItem = (item) => {
                activeItem.value = item;
                showMenu.value = false; // 手機端點擊後收起選單
                if (navigator.vibrate) navigator.vibrate(10);
            };

            const toggleDark = () => {
                isDark.value = !isDark.value;
                document.body.classList.toggle('dark-mode');
            };

            const copyCode = () => {
                navigator.clipboard.writeText(activeItem.value.code);
                copyStatus.value = 'COPIED!';
                setTimeout(() => copyStatus.value = 'COPY', 2000);
            };

            return { categories, activeItem, isDark, showMenu, toggleDark, selectItem, copyCode, copyStatus };
        }
    }).mount('#app');
</script>
</body>
</html>
