<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>緹緹頂規功能元實驗室 - 全量展示</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        :root { --line-green: #06C755; }
        body { font-family: -apple-system, sans-serif; background: #f8fafc; }
        .dark-mode { background: #0f172a; color: #f1f5f9; }
        .glass-sidebar { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border-right: 1px solid rgba(0,0,0,0.1); }
        .dark-mode .glass-sidebar { background: rgba(30, 41, 59, 0.7); border-right: 1px solid rgba(255,255,255,0.1); }
        .active-item { border-left: 4px solid var(--line-green); background: rgba(6, 199, 85, 0.1); }
    </style>
</head>
<body class="transition-colors duration-500">

<div id="app" class="flex h-screen overflow-hidden">
    <aside class="w-80 glass-sidebar flex flex-col h-full">
        <div class="p-6 border-b">
            <h1 class="text-2xl font-black text-green-600">TITILab</h1>
            <p class="text-xs text-gray-400">250 項功能元字典 v1.0</p>
        </div>
        
        <div class="flex-1 overflow-y-auto p-4 custom-scrollbar">
            <div v-for="(group, key) in categories" :key="key" class="mb-8">
                <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4 px-2">{{ key }}</h3>
                <div v-for="item in group" :key="item.id" 
                     @click="activeItem = item"
                     class="p-3 mb-1 rounded-xl cursor-pointer transition-all hover:translate-x-1 flex items-center gap-3"
                     :class="activeItem?.id === item.id ? 'active-item text-green-600' : 'text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800'">
                    <span class="text-[10px] font-mono opacity-50">{{ item.id }}</span>
                    <span class="text-sm font-medium">{{ item.name }}</span>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col">
        <header class="h-16 flex items-center justify-between px-10 border-b dark:border-gray-800">
            <div class="flex items-center gap-2">
                <span class="px-2 py-1 bg-green-100 text-green-600 text-[10px] rounded font-bold">{{ activeItem?.category || 'Ready' }}</span>
                <h2 class="font-bold">{{ activeItem?.name || '請選擇一個功能元' }}</h2>
            </div>
            <button @click="toggleDark" class="w-10 h-10 rounded-full bg-gray-100 dark:bg-gray-800 flex items-center justify-center">
                {{ isDark ? '🌙' : '☀️' }}
            </button>
        </header>

        <section class="flex-1 overflow-y-auto p-12 bg-white dark:bg-slate-900">
            <div v-if="activeItem" class="max-w-4xl mx-auto space-y-10">
                <div class="p-10 rounded-3xl border-2 border-dashed border-gray-200 dark:border-gray-700 min-h-[300px] flex items-center justify-center">
                    <div class="text-center">
                        <p class="text-gray-400 mb-4">這是一個 [{{ activeItem.name }}] 的展示效果</p>
                        <div v-html="previewContent"></div>
                    </div>
                </div>

                <div class="bg-gray-900 rounded-2xl p-6 relative group">
                    <button @click="copyCode" class="absolute top-4 right-4 text-xs text-green-400 opacity-0 group-hover:opacity-100 transition">複製程式碼</button>
                    <pre class="text-green-400 font-mono text-sm leading-relaxed"><code>{{ activeItem.code }}</code></pre>
                </div>
            </div>
        </section>
    </main>
</div>

<script>
    const { createApp, ref, onMounted, computed } = Vue;

    createApp({
        setup() {
            const categories = ref({});
            const activeItem = ref(null);
            const isDark = ref(false);

            // [02-19] 核心：從獨立 JSON 檔案抓取資料
            onMounted(async () => {
                try {
                    const res = await fetch('config.json');
                    categories.value = await res.json();
                } catch (e) {
                    console.error("無法加載 JSON，請確保檔案存在！");
                }
            });

            const previewContent = computed(() => {
                if (!activeItem.value) return '';
                // 這裡可以寫更複雜的邏輯，將代碼轉化為真正的 UI 預覽
                return activeItem.value.code;
            });

            const toggleDark = () => {
                isDark.value = !isDark.value;
                document.body.classList.toggle('dark-mode');
            };

            const copyCode = () => {
                navigator.clipboard.writeText(activeItem.value.code);
                alert('已複製到剪貼簿！');
            };

            return { categories, activeItem, isDark, toggleDark, previewContent, copyCode };
        }
    }).mount('#app');
</script>
</body>
</html>
