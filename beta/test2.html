<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>w2.h528.com 文章列表</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f7f9fc; }
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;  
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div id="app" class="max-w-3xl mx-auto py-8 px-4">
        <h1 class="text-2xl font-bold mb-6 text-gray-800 border-l-4 border-blue-600 pl-3">
            來自 w2.h528.com 的文章範本 (50篇)
        </h1>

        <div v-if="loading" class="text-center py-10 text-gray-500">
            <i class="fas fa-spinner animate-spin mr-2"></i> 正在從 w2.h528.com 讀取數據...
        </div>

        <div v-else class="space-y-4">
            <article v-for="post in posts" :key="post.id" class="bg-white p-5 rounded-lg shadow-sm border border-gray-200">
                <div class="flex items-center mb-3">
                    <div class="w-8 h-8 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center font-bold text-xs mr-3">
                        {{ post.id }}
                    </div>
                    <div>
                        <h2 class="font-bold text-gray-900">{{ post.title }}</h2>
                        <p class="text-xs text-gray-400">來源連結：w2.h528.com/item/{{ post.id }}</p>
                    </div>
                </div>

                <div class="text-gray-700 text-sm leading-relaxed">
                    <div :class="{'line-clamp-3': !post.isExpanded}">
                        {{ post.content }}
                    </div>
                    <button 
                        v-if="post.content.length > 80" 
                        @click="post.isExpanded = !post.isExpanded"
                        class="text-blue-600 font-medium mt-2 hover:text-blue-800 focus:outline-none"
                    >
                        {{ post.isExpanded ? '收起文章' : '...顯示更多' }}
                    </button>
                </div>
            </article>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;

        createApp({
            setup() {
                const posts = ref([]);
                const loading = ref(true);

                // 模擬抓取 w2.h528.com 站點的文章連結內容
                const fetchData = () => {
                    loading.value = true;
                    // 根據部長提供的網址特性，生成 50 篇對應的內容
                    const rawData = Array.from({ length: 50 }, (_, i) => ({
                        id: i + 1,
                        title: `w2.h528.com 資源導航文章 #${i + 1}`,
                        content: `這是從 w2.h528.com 抓取的第 ${i + 1} 篇文章內容範本。該站點主要提供多元化的資源整合與導航服務。這是一段較長的內容測試，旨在展示文章列表的自動收合功能。當文字超過三行時，系統會自動截斷並顯示展開按鈕，確保動態牆的整潔度與閱讀體驗。`.repeat(2),
                        isExpanded: false
                    }));

                    // 模擬網路延遲
                    setTimeout(() => {
                        posts.value = rawData;
                        loading.value = false;
                    }, 800);
                };

                onMounted(() => fetchData());

                return { posts, loading };
            }
        }).mount('#app');
    </script>
</body>
</html>
