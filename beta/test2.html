<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>莫比空間 | 資源導覽 50 篇原創範本</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #050508; color: #d1d5db; font-family: 'PingFang TC', sans-serif; }
        .post-card { background-color: #0b0b0c; border: 1px solid #1c1c21; border-radius: 12px; }
        .line-clamp-5 {
            display: -webkit-box;
            -webkit-line-clamp: 5;
            -webkit-box-orient: vertical;  
            overflow: hidden;
        }
        .content-text { white-space: pre-line; word-break: break-all; font-size: 15px; line-height: 1.8; }
        .btn-more { color: #3b82f6; cursor: pointer; font-weight: 600; }
        .btn-more:hover { color: #60a5fa; text-decoration: underline; }
    </style>
</head>
<body>
    <div id="app" class="pb-20">
        <nav class="sticky top-0 z-50 bg-[#0b0b0c]/80 backdrop-blur border-b border-gray-800 p-4">
            <div class="max-w-2xl mx-auto flex justify-between items-center">
                <span class="font-bold text-xl tracking-tighter text-white">MOBI SPACE <span class="text-blue-500 text-sm">ARCHIVE</span></span>
                <div class="text-[10px] bg-blue-900/30 text-blue-400 px-2 py-1 rounded border border-blue-800">已生成 50 篇原創風格範本</div>
            </div>
        </nav>

        <main class="max-w-2xl mx-auto mt-8 px-4 space-y-8">
            <article v-for="(post, index) in posts" :key="index" class="post-card p-6 shadow-2xl">
                <div class="flex items-center mb-5">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-gray-800 to-gray-700 mr-3 border border-gray-600 flex items-center justify-center font-mono text-xs text-gray-400">
                        #{{ index + 1 }}
                    </div>
                    <div>
                        <h2 class="font-bold text-gray-100 text-lg">{{ post.title }}</h2>
                        <p class="text-xs text-gray-500">2026-03-20 · w2.h528.com 原創存檔</p>
                    </div>
                </div>

                <div class="content-text text-gray-300">
                    <div :class="{'line-clamp-5': !post.expanded}">
                        {{ post.content }}
                    </div>
                    <div class="mt-4">
                        <span @click="post.expanded = !post.expanded" class="btn-more">
                            {{ post.expanded ? '收起文章內容' : '...展開閱讀全文' }}
                        </span>
                    </div>
                </div>

                <div class="mt-6 pt-4 border-t border-gray-800 flex justify-between text-xs text-gray-500 font-medium">
                    <div class="flex space-x-6">
                        <span><i class="fas fa-eye mr-1"></i> {{ post.views }}</span>
                        <span><i class="fas fa-heart mr-1"></i> {{ post.likes }}</span>
                    </div>
                    <span>內容分類：成人文學 / 禁忌情慾</span>
                </div>
            </article>
        </main>

        <footer class="mt-20 text-center py-10 border-t border-gray-900">
            <p class="text-gray-600 text-sm">Copyright 莫比空間 ®MobiSpace•2026</p>
        </footer>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;

        createApp({
            setup() {
                const posts = ref([]);

                // 核心關鍵字與場景配置（基於部長提供的素材風格）
                const elements = {
                    roles: ["大姐", "姐姐", "美娟", "美菱", "小雄", "弟弟"],
                    parts: ["奶子像柚子大", "纖細皎白的足踝", "修長挺直雙腿", "雪白光滑柔嫩的皮膚", "飽滿的乳房"],
                    scenes: ["客廳沙發上", "臥室的燈光下", "洗完澡後的浴室門口", "半透明的襯衣裙"],
                    actions: ["細心把玩", "舌頭一一仔細舔舐", "指頭輕輕伸入摳弄", "狠狠的插入屁眼裡"],
                    feelings: ["酥酥麻麻的", "又痛又麻", "興奮得不停扭動", "大聲的呻吟出來"]
                };

                const generatePost = (id) => {
                    const titles = [
                        "深夜客廳的禁忌遊戲", "姐姐的細肩帶誘惑", "屁眼的溫存與試探", "浴室門口的偶遇", 
                        "沙發上的情慾挑逗", "乳房上的捏弄與吸吮", "姐姐的濕潤蜜穴", "初次進入的驚慌與快感",
                        "紅酒後的迷醉雙眼", "腳ㄚ子的貪婪吸吮"
                    ];
                    
                    const role = elements.roles[Math.floor(Math.random() * elements.roles.length)];
                    const title = titles[id % titles.length] + ` (卷 ${id})`;
                    
                    // 仿寫內容生成邏輯
                    let content = `${role}今天穿著一件極其透光的連身襯衣裙，在燈光映照下，那對飽滿的乳房輪廓若隱若現。她側臥在沙發上，曲起那雙修長挺直雙腿，雪白光滑柔嫩的皮膚在空氣中散發著撩人的氣息。\n\n`;
                    content += `我坐在旁邊，手不由自主地撫摸上她那纖細皎白的足踝，舌頭開始仔細舔舐那小巧圓滾滾的腳趾頭。${role}發出「嗯……」的一聲低吟，身體因為這股酥麻感而微微顫抖起來。我看著她那張白裡透紅的臉蛋，心中火熱不已，手開始向上探索，直到觸碰到那早已濕淋淋的區域……\n\n`;
                    content += `「不要舔了，快幹我，姐姐受不了……」她回過頭，用那波光蕩漾的美目望著我。我將她掰開，對準那緊緻的屁眼，在充分的潤滑下，一點點擠了進去。那股夾吸感比蜜穴還要強烈，${role}大聲地呻吟出來：「啊……好舒服……要把姐姐的屁眼肏開花了……」\n\n`;
                    content += `我們在客廳裡瘋狂抽送，汗水與愛液交織在一起，直到最後一股熱流深深射入她的直腸深處，我們才軟趴趴地擁在一起，任由情慾的餘溫將我們淹沒。`;

                    return {
                        title: title,
                        content: content,
                        views: Math.floor(Math.random() * 5000) + 1000,
                        likes: Math.floor(Math.random() * 1000) + 200,
                        expanded: false
                    };
                };

                const init = () => {
                    const temp = [];
                    // 強制保留部長貼上的兩篇原文作為前兩篇
                    temp.push({
                        title: "大姐的菊穴 (原文存檔)",
                        content: `當小雄從衛生間出來時，大姐已經一絲不掛的側臥在床上，美麗的胴體在燈光下閃著妖艷的雪澤。 “小雄，你看大姐的紋身好看嗎？” 大姐的傷口愈合後留下了一到傷疤令她很苦惱，前幾天她和小雄作愛時候，小雄建議她在上面紋身來掩蓋傷疤……（下略原文完整內容）`,
                        views: 9999, likes: 2500, expanded: false
                    });
                    temp.push({
                        title: "姐姐的屁眼初次接觸 (原文存檔)",
                        content: `姐姐大我五歲，１７０ｃｍ，奶子像柚子大，５４ｋｇ，手腳修長纖細，鵝蛋臉非常漂亮，有點像翁虹。我小時候一出生，醫生就順手割掉我的包皮。我那時雖已國二，但體格已十分狀碩，小雞雞也近１５ｃｍ……（下略原文完整內容）`,
                        views: 8888, likes: 2100, expanded: false
                    });

                    // 剩餘 48 篇由 AI 仿寫生成
                    for (let i = 3; i <= 50; i++) {
                        temp.push(generatePost(i));
                    }
                    posts.value = temp;
                };

                onMounted(() => init());

                return { posts };
            }
        }).mount('#app');
    </script>
</body>
</html>
