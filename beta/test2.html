<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ⲙ𝔬ⲃ¡ⳝ𝔭ⲁⲉ | 120 篇分類存檔</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --ios-bg: #050508;
            --ios-card: rgba(28, 28, 30, 0.85);
            --article-text-color: #ffffff;
            --article-font-size: 17px;
            --accent-color: #00cec9;
            --panel-bg: rgba(20, 20, 22, 0.98);
        }
        [data-theme="light"] {
            --ios-bg: #f2f2f7;
            --ios-card: rgba(255, 255, 255, 0.9);
            --article-text-color: #1c1c1e;
            --panel-bg: rgba(255, 255, 255, 0.98);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            background-color: var(--ios-bg); color: var(--article-text-color);
            line-height: 1.8; transition: background 0.3s;
        }

        /* 頂部毛玻璃導航 */
        .header-nav {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-top: env(safe-area-inset-top);
        }
        .tabs-wrapper {
            display: flex; overflow-x: auto; padding: 10px 15px; gap: 10px;
            scrollbar-width: none; /* Firefox */
        }
        .tabs-wrapper::-webkit-scrollbar { display: none; } /* Chrome/Safari */
        
        .tab-item {
            white-space: nowrap; padding: 8px 18px; border-radius: 20px;
            font-size: 14px; font-weight: 600; color: #8e8e93;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer;
        }
        .tab-item.active { background: var(--accent-color); color: #000; box-shadow: 0 4px 12px rgba(0,206,201,0.3); }

        .article-container { max-width: 500px; margin: 0 auto; padding: 130px 20px 150px; }
        
        /* 搜尋框優化 */
        .search-box {
            background: var(--ios-card); padding: 12px 16px; border-radius: 14px;
            display: flex; align-items: center; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.05);
        }
        .search-box input { background: transparent; border: none; color: inherit; margin-left: 10px; width: 100%; outline: none; font-size: 15px; }

        .post-item { background: var(--ios-card); border-radius: 26px; padding: 25px; margin-bottom: 35px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        .post-title { font-size: 22px; font-weight: 800; margin-bottom: 10px; line-height: 1.3; }
        .tag-pill { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; background: rgba(255,69,58,0.1); color: #ff453a; margin-right: 6px; margin-bottom: 8px; }
        
        .post-content { font-size: var(--article-font-size); white-space: pre-wrap; margin-top: 15px; }
        .summary { color: #8e8e93; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
        .expand-btn { color: var(--accent-color); font-weight: 700; cursor: pointer; margin-top: 15px; display: block; }

        /* 設定與進度 */
        #progress-bar { position: fixed; top: 0; left: 0; height: 3px; background: var(--accent-color); z-index: 2001; }
        .mobi-float { position: fixed; bottom: 40px; right: 20px; z-index: 2001; display: flex; flex-direction: column; gap: 12px; }
        .float-btn { width: 50px; height: 50px; border-radius: 25px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); display: flex; items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }

        /* 警告窗 */
        .warning-overlay { position: fixed; inset: 0; background: #000; z-index: 3000; display: flex; align-items: center; justify-content: center; text-align: center; padding: 40px; }
        .enter-btn { background: #ff453a; color: #fff; padding: 15px 50px; border-radius: 30px; border: none; font-weight: 800; margin-top: 30px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="app">
        <div v-if="showWarning" class="warning-overlay">
            <div>
                <h1 style="font-size: 48px; color: #ff453a;">18+</h1>
                <p style="color: #8e8e93;">本站包含 120 篇成人內容<br>含家庭亂倫、口交、肛門、侵犯等情節</p>
                <button class="enter-btn" @click="showWarning = false">我已滿18歲</button>
            </div>
        </div>

        <div id="progress-bar" :style="{width: scrollProgress + '%'}"></div>

        <div class="header-nav">
            <div class="tabs-wrapper">
                <div v-for="tab in categories" 
                     :key="tab.name" 
                     class="tab-item" 
                     :class="{active: currentTab === tab.name}"
                     @click="currentTab = tab.name">
                    {{ tab.name }} ({{ countByCategory(tab.tags) }})
                </div>
            </div>
        </div>

        <div class="mobi-float">
            <div @click="toggleTheme" class="float-btn"><i :class="isDark ? 'fa-solid fa-sun' : 'fa-solid fa-moon'"></i></div>
            <div @click="scrollToTop" class="float-btn"><i class="fa-solid fa-arrow-up"></i></div>
        </div>

        <div class="article-container" :style="{ filter: `brightness(${brightness}%)` }">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass text-gray-500"></i>
                <input type="text" v-model="searchQuery" placeholder="在 120 篇文章中搜尋...">
            </div>

            <div v-for="post in filteredPosts" :key="post.id" class="post-item">
                <div>
                    <span v-for="tag in post.tags" class="tag-pill">{{ tag }}</span>
                </div>
                <h2 class="post-title">{{ post.title }}</h2>
                <p style="font-size: 10px; color: #666;">MOBI-ARCHIVE #{{ post.id }}</p>
                
                <div class="post-content" :style="{ fontSize: fontSize + 'px' }">
                    <div v-if="!post.expanded" class="summary">{{ post.content }}</div>
                    <div v-else>{{ post.content }}</div>
                    <span class="expand-btn" @click="post.expanded = !post.expanded">
                        {{ post.expanded ? '收起文章' : '閱讀完整無刪減內容' }}
                    </span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;

        createApp({
            setup() {
                const showWarning = ref(true);
                const isDark = ref(true);
                const currentTab = ref('全部');
                const searchQuery = ref('');
                const scrollProgress = ref(0);
                const fontSize = ref(17);
                const brightness = ref(100);
                const posts = ref([]);

                // 導航分類定義
                const categories = [
                    { name: '全部', tags: [] },
                    { name: '家庭亂倫', tags: ['媽媽', '繼母', '繼父', '公公', '哥哥', '妹妹', '姐姐', '爸爸', '叔叔', '伯父', '兒媳', '弟媳', '近親相姦', '家庭亂倫'] },
                    { name: '姻親關係', tags: ['嫂子', '媳婦', '小姨子', '阿姨', '朋友妻子'] },
                    { name: '體位動作', tags: ['肛門', '菊花', '兩穴', '深喉', '口交', '口爆', '吞精'] },
                    { name: '暴力侵犯', tags: ['強姦', '侵犯', '寢取', '戀童'] }
                ];

                // 核心文本：大姐、姐姐、大嫂
                const fullTextA = `當小雄從衛生間出來時，大姐已經一絲不掛的側臥在床上...（全文無刪減...）`;
                const fullTextB = `姐姐大我五歲，１７０ｃｍ，奶子像柚子大...（全文無刪減...）`;
                const fullTextC = `我從小到大都在台北長大念書...（全文無刪減...）`;

                const allTags = ["媽媽", "繼母", "繼父", "公公", "哥哥", "妹妹", "姐姐", "小姨子", "嫂子", "媳婦", "朋友妻子", "近親相姦", "家庭亂倫", "男女學生", "男女同性戀", "肛門", "菊花", "兩穴", "深喉", "口交", "口爆", "吞精", "強姦", "寢取", "侵犯", "戀童", "阿姨", "弟媳", "兒媳", "爸爸", "叔叔", "伯父"];

                const initData = () => {
                    const temp = [];
                    for(let i=0; i<120; i++) {
                        let content, title, tags = [];
                        
                        // 輪替文本內容
                        if (i % 3 === 0) content = fullTextA;
                        else if (i % 3 === 1) content = fullTextB;
                        else content = fullTextC;

                        // 分配標籤
                        const mainTag = allTags[i % allTags.length];
                        tags.push(mainTag);
                        if (i % 4 === 0) tags.push("家庭亂倫");
                        if (i % 5 === 0) tags.push("口爆");

                        temp.push({
                            id: 202600 + i,
                            title: `${mainTag}的${i%2==0?'私密':'禁忌'}往事`,
                            content: content,
                            tags: tags,
                            expanded: false
                        });
                    }
                    posts.value = temp;
                };

                const countByCategory = (tags) => {
                    if (tags.length === 0) return 120;
                    return posts.value.filter(p => p.tags.some(t => tags.includes(t))).length;
                };

                const filteredPosts = computed(() => {
                    let result = posts.value;
                    
                    // 1. Tab 過濾
                    if (currentTab.value !== '全部') {
                        const targetTags = categories.find(c => c.name === currentTab.value).tags;
                        result = result.filter(p => p.tags.some(t => targetTags.includes(t)));
                    }

                    // 2. 搜尋過濾
                    if (searchQuery.value) {
                        const q = searchQuery.value.toLowerCase();
                        result = result.filter(p => p.title.includes(q) || p.content.includes(q) || p.tags.some(t => t.includes(q)));
                    }

                    return result;
                });

                const toggleTheme = () => {
                    isDark.value = !isDark.value;
                    document.documentElement.setAttribute('data-theme', isDark.value ? 'dark' : 'light');
                };

                const scrollToTop = () => window.scrollTo({ top: 0, behavior: 'smooth' });

                onMounted(() => {
                    initData();
                    window.onscroll = () => {
                        let winScroll = document.documentElement.scrollTop;
                        let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
                        scrollProgress.value = (winScroll / height) * 100;
                    };
                });

                return { showWarning, isDark, currentTab, searchQuery, scrollProgress, fontSize, brightness, categories, filteredPosts, toggleTheme, countByCategory, scrollToTop };
            }
        }).mount('#app');
    </script>
</body>
</html>
