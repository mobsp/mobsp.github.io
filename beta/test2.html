<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>部長的文章空間 - Advanced Wall</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f0f2f5; font-family: 'PingFang TC', sans-serif; }
        .post-card { border-radius: 8px; transition: transform 0.2s; }
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;  
            overflow: hidden;
        }
        .fade-enter-active, .fade-leave-active { transition: opacity 0.5s ease; }
        .fade-enter-from, .fade-leave-to { opacity: 0; }
    </style>
</head>
<body>
    <div id="app" class="min-h-screen">
        <nav class="sticky top-0 bg-white border-b z-50 px-4 py-2 flex justify-between items-center shadow-sm">
            <div class="flex items-center space-x-2">
                <div class="bg-blue-600 text-white w-10 h-10 rounded-lg flex items-center justify-center font-bold text-xl">W2</div>
                <span class="hidden md:block font-bold text-gray-700 text-lg">技術文章導覽</span>
            </div>
            <div class="flex items-center bg-gray-100 rounded-full px-4 py-2 w-1/3">
                <i class="fas fa-search text-gray-400"></i>
                <input type="text" v-model="searchQuery" placeholder="搜尋文章標題或關鍵字..." class="bg-transparent outline-none ml-2 w-full text-sm">
            </div>
            <div class="flex items-center space-x-4">
                <button @click="refreshData" class="text-blue-600 hover:bg-blue-50 p-2 rounded-full transition">
                    <i class="fas fa-sync-alt" :class="{'animate-spin': loading}"></i>
                </button>
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Admin" class="w-9 h-9 rounded-full bg-gray-200">
            </div>
        </nav>

        <main class="max-w-4xl mx-auto py-6 px-4">
            <div class="bg-white p-4 rounded-xl shadow-sm mb-6 border">
                <div class="flex space-x-3">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Admin" class="w-10 h-10 rounded-full">
                    <textarea v-model="newPost" rows="2" placeholder="撰寫新的技術文章..." class="w-full bg-gray-50 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-100 resize-none transition"></textarea>
                </div>
                <div class="flex justify-between items-center mt-3 pt-3 border-t">
                    <div class="flex space-x-2">
                        <button class="p-2 hover:bg-gray-100 rounded text-green-600"><i class="fas fa-code"></i></button>
                        <button class="p-2 hover:bg-gray-100 rounded text-blue-500"><i class="fas fa-link"></i></button>
                    </div>
                    <button @click="publishPost" class="bg-blue-600 text-white px-6 py-1.5 rounded-lg font-medium hover:bg-blue-700 transition">發佈文章</button>
                </div>
            </div>

            <div v-if="loading" class="text-center py-20">
                <div class="inline-block animate-bounce bg-blue-600 w-3 h-3 rounded-full mr-2"></div>
                <div class="inline-block animate-bounce bg-blue-600 w-3 h-3 rounded-full mr-2" style="animation-delay: 0.1s"></div>
                <div class="inline-block animate-bounce bg-blue-600 w-3 h-3 rounded-full" style="animation-delay: 0.2s"></div>
                <p class="text-gray-500 mt-4 text-sm">緹緹正在從 w2.h528.com 獲取 50 篇文章...</p>
            </div>

            <div v-else class="space-y-6">
                <transition-group name="fade">
                    <article v-for="post in filteredPosts" :key="post.id" class="bg-white post-card shadow-sm border border-gray-100 overflow-hidden">
                        <div class="p-4 flex items-center justify-between">
                            <div class="flex items-center space-x-3">
                                <img :src="post.avatar" class="w-11 h-11 rounded-full border shadow-sm">
                                <div>
                                    <h3 class="font-bold text-gray-800 leading-tight">{{ post.author }}</h3>
                                    <p class="text-xs text-gray-500">{{ post.date }} · {{ post.category }}</p>
                                </div>
                            </div>
                            <span class="text-blue-500 text-xs bg-blue-50 px-2 py-1 rounded">#{{ post.tag }}</span>
                        </div>

                        <div class="px-5 pb-4">
                            <h2 class="text-xl font-bold mb-2 text-gray-900 leading-snug">{{ post.title }}</h2>
                            <div class="text-gray-700 leading-relaxed text-justify">
                                <div :class="{'line-clamp-3': !post.isExpanded}">
                                    {{ post.content }}
                                </div>
                                <button 
                                    v-if="post.content.length > 120" 
                                    @click="post.isExpanded = !post.isExpanded"
                                    class="text-blue-600 font-semibold text-sm mt-2 hover:underline focus:outline-none"
                                >
                                    {{ post.isExpanded ? '收起文章' : '...顯示更多內容' }}
                                </button>
                            </div>
                        </div>

                        <div v-if="post.image" class="w-full h-64 bg-gray-100">
                            <img :src="post.image" class="w-full h-full object-cover border-t border-b">
                        </div>

                        <div class="px-5 py-3 flex items-center justify-between text-gray-500 border-t bg-gray-50/50">
                            <div class="flex space-x-6">
                                <button @click="post.likes++" class="hover:text-blue-600 transition flex items-center">
                                    <i class="far fa-thumbs-up mr-2"></i> {{ post.likes }}
                                </button>
                                <button class="hover:text-blue-600 transition flex items-center">
                                    <i class="far fa-comment-dots mr-2"></i> {{ post.comments }}
                                </button>
                            </div>
                            <button class="hover:text-blue-600 transition"><i class="far fa-bookmark"></i></button>
                        </div>
                    </article>
                </transition-group>
            </div>
        </main>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;

        createApp({
            setup() {
                const posts = ref([]);
                const loading = ref(true);
                const searchQuery = ref('');
                const newPost = ref('');

                // 模擬從 w2.h528.com 自動抓取內容的邏輯
                const generateMockData = () => {
                    loading.value = true;
                    const categories = ['Rust', 'Vue.js', 'Frontend', 'Backend', 'AI', 'System Design'];
                    const titles = [
                        "深度解析高性能 Rust 網路爬蟲架構", "Vue 3 組合式 API 的美學實踐", "現代化 Web 性能優化指南", 
                        "如何打造一個響應式 UI 組件庫", "微服務架構下的數據一致性探討", "TypeScript 進階類型技巧分享",
                        "從 0 到 1 實作一個前端路由管理器", "Docker 容器化部署最佳實踐"
                    ];
                    const contentPool = [
                        "在這個快速發展的時代，技術的更新換代讓我們目不暇給。本文將深入探討如何利用最新的渲染引擎來提升用戶體驗，不僅是從代碼層面，更要從用戶感知的層面進行優化。我們觀察到，許多開發者在實作時往往忽略了關鍵路徑的渲染性能，導致 LCP 指標不盡理想。透過本次的案例分析，我們將揭開高效能 Web 應用的神秘面紗，並提供完整的解決方案供各位參考。讓我們一起進入這段精彩的技術旅程吧！",
                        "代碼美學不只是排版的整齊，更是邏輯的純粹。當我們在使用 Rust 進行系統開發時，所有權機制（Ownership）提供了強大的記憶體安全性保障。雖然起步時生命週期（Lifetimes）可能會讓初學者感到困惑，但一旦掌握了其中的奧妙，你就能體會到編譯器如何像一位嚴師一樣，引導你寫出零錯誤、零負擔的高性能代碼。這正是為什麼越來越多的大型項目選擇 Rust 作為底層語言的原因。"
                    ];

                    setTimeout(() => {
                        const tempPosts = [];
                        for (let i = 1; i <= 50; i++) {
                            tempPosts.push({
                                id: i,
                                author: `技術專家_${i}`,
                                title: titles[Math.floor(Math.random() * titles.length)] + ` (ID: ${i})`,
                                content: contentPool[i % 2] + " 這是一段為了演示「展開閱讀」功能而生成的超長補充文本。我們需要確保內容長度足以觸發 line-clamp 限制，讓使用者能夠點擊展開按鈕來閱讀完整的技術細節與優化方案說明。".repeat(2),
                                avatar: `https://api.dicebear.com/7.x/identicon/svg?seed=${i}`,
                                date: `2024-05-${(i % 28 + 1).toString().padStart(2, '0')}`,
                                category: categories[i % categories.length],
                                tag: ['熱門', '精選', '原創'][i % 3],
                                image: i % 3 === 0 ? `https://picsum.photos/seed/${i}/800/400` : null,
                                likes: Math.floor(Math.random() * 500),
                                comments: Math.floor(Math.random() * 100),
                                isExpanded: false
                            });
                        }
                        posts.value = tempPosts;
                        loading.value = false;
                    }, 1500);
                };

                const filteredPosts = computed(() => {
                    if (!searchQuery.value) return posts.value;
                    return posts.value.filter(p => 
                        p.title.toLowerCase().includes(searchQuery.value.toLowerCase()) || 
                        p.content.toLowerCase().includes(searchQuery.value.toLowerCase())
                    );
                });

                const publishPost = () => {
                    if (!newPost.value.trim()) return;
                    posts.value.unshift({
                        id: Date.now(),
                        author: '部長',
                        title: '新發佈的技術筆記',
                        content: newPost.value,
                        avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Admin',
                        date: '剛剛',
                        category: '我的動態',
                        tag: '原創',
                        image: null,
                        likes: 0,
                        comments: 0,
                        isExpanded: false
                    });
                    newPost.value = '';
                };

                const refreshData = () => generateMockData();

                onMounted(() => generateMockData());

                return { 
                    posts, loading, searchQuery, filteredPosts, 
                    newPost, publishPost, refreshData 
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
