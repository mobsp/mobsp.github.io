<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ⲙ𝔬ⲃ¡ⳝ𝔭ⲁ𝔠ⲉ | 智能記憶存檔</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --ios-bg: #050508;
            --ios-card: rgba(28, 28, 30, 0.7);
            --accent-color: #00cec9;
            --panel-bg: rgba(20, 20, 22, 0.95);
        }
        [data-theme="light"] {
            --ios-bg: #f2f2f7;
            --ios-card: rgba(255, 255, 255, 0.8);
            --panel-bg: rgba(255, 255, 255, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            background-color: var(--ios-bg);
            transition: background 0.5s ease; overflow-x: hidden;
        }

        /* --- 流光動態背景 --- */
        .glass-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1;
            background: linear-gradient(125deg, #050508, #1a1a2e, #002b2b, #050508);
            background-size: 400% 400%;
            animation: GradientFlow 15s ease infinite;
        }
        [data-theme="light"] .glass-bg {
            background: linear-gradient(125deg, #f2f2f7, #e8e8ff, #e0ffff, #f2f2f7);
            background-size: 400% 400%;
        }
        @keyframes GradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- 頂部導航 --- */
        .header-nav {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(0,0,0,0.3); backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-top: env(safe-area-inset-top);
        }
        .tabs-wrapper { display: flex; overflow-x: auto; padding: 12px 15px; gap: 10px; scrollbar-width: none; }
        .tab-item {
            white-space: nowrap; padding: 8px 18px; border-radius: 20px;
            font-size: 13px; font-weight: 600; color: #8e8e93;
            background: rgba(255,255,255,0.05); transition: 0.3s;
        }
        .tab-item.active { background: var(--accent-color); color: #000; box-shadow: 0 4px 15px rgba(0,206,201,0.3); }

        /* --- 內容區域 --- */
        .article-container { max-width: 500px; margin: 0 auto; padding: 120px 20px 100px; }
        .post-item { 
            background: var(--ios-card); border-radius: 28px; padding: 25px; margin-bottom: 30px;
            backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08);
        }
        .post-title { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
        .tag-pill { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; background: rgba(255,69,58,0.15); color: #ff453a; margin-right: 6px; }

        /* --- 設定面板 --- */
        .mobi-settings-panel {
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: var(--panel-bg); border-radius: 35px 35px 0 0;
            padding: 30px 30px 60px; transform: translateY(100%);
            transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1); z-index: 2005;
        }
        .mobi-settings-panel.show { transform: translateY(0); }
        .setting-row { margin-bottom: 25px; }
        .setting-label { display: flex; justify-content: space-between; font-size: 12px; color: #8e8e93; margin-bottom: 12px; font-weight: 700; }
        
        .switch-btn { width: 100%; padding: 12px; border-radius: 12px; background: rgba(128,128,128,0.1); border: none; color: inherit; font-weight: 700; cursor: pointer; }

        input[type="range"] { -webkit-appearance: none; width: 100%; height: 8px; background: rgba(128,128,128,0.2); border-radius: 10px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 28px; height: 28px; background: #fff; border-radius: 50%; border: 2px solid var(--accent-color); }

        .float-ctrl { position: fixed; bottom: 40px; right: 20px; z-index: 1001; }
        .gear-btn { width: 56px; height: 56px; border-radius: 28px; background: var(--accent-color); color: #000; display: flex; items: center; justify-content: center; font-size: 22px; border: none; }

        .post-content { white-space: pre-wrap; margin-top: 15px; }
        .expand-btn { color: var(--accent-color); font-weight: 700; cursor: pointer; margin-top: 15px; display: block; }

        .warning-overlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; text-align: center; }
        .enter-btn { background: #ff453a; color: #fff; padding: 18px 60px; border-radius: 40px; border: none; font-weight: 900; margin-top: 40px; }
    </style>
</head>
<body>
    <div id="app">
        <div v-if="showWarning" class="warning-overlay">
            <div>
                <h1 style="font-size: 50px; color: #ff453a; font-weight: 900;">RESTRICTED</h1>
                <p style="color: #666;">Ⲙ𝔬ⲃ¡ⳝ𝔭ⲁ𝔠ⲉ | 120 篇 記憶存檔載入中</p>
                <button class="enter-btn" @click="showWarning = false">確認成年並進入</button>
            </div>
        </div>

        <div class="glass-bg"></div>
        <div id="progress-bar" :style="{width: scrollProgress + '%', position:'fixed', top:0, left:0, height:'4px', background:'var(--accent-color)', zIndex:2002}"></div>

        <div class="header-nav">
            <div class="tabs-wrapper">
                <div v-for="tab in categories" :key="tab.name" class="tab-item" :class="{active: currentTab === tab.name}" @click="currentTab = tab.name">
                    {{ tab.name }}
                </div>
            </div>
        </div>

        <div class="float-ctrl">
            <button @click="showSettings = true" class="gear-btn"><i class="fa-solid fa-sliders"></i></button>
        </div>

        <div class="mobi-settings-panel" :class="{show: showSettings}">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
                <span style="font-size: 20px; font-weight: 900;">個人偏好已儲存</span>
                <i class="fa-solid fa-xmark" @click="showSettings = false" style="font-size: 24px;"></i>
            </div>

            <div class="setting-row">
                <button class="switch-btn" @click="toggleTheme">
                    <i :class="isDark ? 'fa-solid fa-moon' : 'fa-solid fa-sun'"></i>
                    切換模式：{{ isDark ? '深色' : '淺色' }}
                </button>
            </div>

            <div class="setting-row">
                <div class="setting-label"><span>字體灰階亮度 (0=白, 100=黑)</span><span>{{ fontColorGray }}%</span></div>
                <input type="range" min="0" max="100" v-model="fontColorGray">
            </div>

            <div class="setting-row">
                <div class="setting-label"><span>字體大小</span><span>{{ fontSize }}px</span></div>
                <input type="range" min="14" max="32" v-model="fontSize">
            </div>

            <div class="setting-row">
                <div class="setting-label"><span>全站閱讀亮度</span><span>{{ brightness }}%</span></div>
                <input type="range" min="20" max="100" v-model="brightness">
            </div>
        </div>

        <div class="article-container" :style="{ filter: `brightness(${brightness}%)` }">
            <div v-for="post in filteredPosts" :key="post.id" class="post-item">
                <div class="mb-4">
                    <span v-for="tag in post.tags" class="tag-pill">{{ tag }}</span>
                </div>
                <h2 class="post-title" :style="{ color: textColorComputed }">{{ post.title }}</h2>
                <div class="post-content" :style="{ fontSize: fontSize + 'px', color: textColorComputed }">
                    <div v-if="!post.expanded" style="opacity: 0.6;">{{ post.content.substring(0, 100) }}...</div>
                    <div v-else>{{ post.content }}</div>
                    <span class="expand-btn" @click="post.expanded = !post.expanded">
                        {{ post.expanded ? '－ 摺疊文章' : '＋ 閱讀全文 (無刪減)' }}
                    </span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted, watch } = Vue;

        createApp({
            setup() {
                const showWarning = ref(true);
                const showSettings = ref(false);
                const isDark = ref(localStorage.getItem('mobi-dark') !== 'false');
                const currentTab = ref('全部');
                const fontSize = ref(parseInt(localStorage.getItem('mobi-font-size')) || 17);
                const brightness = ref(parseInt(localStorage.getItem('mobi-brightness')) || 100);
                const fontColorGray = ref(parseInt(localStorage.getItem('mobi-font-gray')) || 0);
                const scrollProgress = ref(0);
                const posts = ref([]);

                const categories = [
                    { name: '全部', tags: [] },
                    { name: '家庭亂倫', tags: ['媽媽', '繼母', '繼父', '爸爸', '妹妹', '姐姐'] },
                    { name: '姻親禁忌', tags: ['嫂子', '媳婦', '小姨子', '阿姨'] },
                    { name: '體位動作', tags: ['肛門', '菊花', '口爆', '深喉'] }
                ];

                // 監聽所有設定並自動存入 LocalStorage
                watch([isDark, fontSize, brightness, fontColorGray], () => {
                    localStorage.setItem('mobi-dark', isDark.value);
                    localStorage.setItem('mobi-font-size', fontSize.value);
                    localStorage.setItem('mobi-brightness', brightness.value);
                    localStorage.setItem('mobi-font-gray', fontColorGray.value);
                    document.documentElement.setAttribute('data-theme', isDark.value ? 'dark' : 'light');
                });

                const textColorComputed = computed(() => {
                    const val = Math.floor(255 - (fontColorGray.value * 2.55));
                    return `rgb(${val}, ${val}, ${val})`;
                });

                const toggleTheme = () => { isDark.value = !isDark.value; };

                const initData = () => {
                    const allTags = ["媽媽", "繼母", "繼父", "公公", "哥哥", "妹妹", "姐姐", "小姨子", "嫂子", "媳婦", "朋友妻子", "近親相姦", "家庭亂倫", "男女學生", "男女同性戀", "肛門", "菊花", "兩穴", "深喉", "口交", "口爆", "吞精", "強姦", "寢取", "侵犯", "戀童", "阿姨", "弟媳", "兒媳", "爸爸", "叔叔", "伯父"];
                    for(let i=0; i<120; i++) {
                        posts.value.push({
                            id: i,
                            title: `${allTags[i % allTags.length]}的${i%3==0?'誘惑':'祕密'} (存檔${i+1})`,
                            content: `(此處載入部長提供的完整長文：大姐、姐姐、大嫂無刪減原文...)`,
                            tags: [allTags[i % allTags.length], '全文本'],
                            expanded: false
                        });
                    }
                };

                const filteredPosts = computed(() => {
                    if (currentTab.value === '全部') return posts.value;
                    const cat = categories.find(c => c.name === currentTab.value);
                    return posts.value.filter(p => p.tags.some(t => cat.tags.includes(t)));
                });

                onMounted(() => {
                    initData();
                    document.documentElement.setAttribute('data-theme', isDark.value ? 'dark' : 'light');
                    window.onscroll = () => {
                        let winScroll = document.documentElement.scrollTop;
                        let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
                        scrollProgress.value = (winScroll / height) * 100;
                    };
                });

                return { showWarning, showSettings, isDark, currentTab, fontSize, brightness, fontColorGray, scrollProgress, categories, filteredPosts, textColorComputed, toggleTheme };
            }
        }).mount('#app');
    </script>
</body>
</html>
