<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ⲙ𝔬ⲃ¡ⳝ𝔭ⲁ𝔠ⲉ | 120 篇獨立長文庫</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --ios-bg: #050508; --ios-card: rgba(28, 28, 30, 0.75); --accent-color: #00cec9; }
        [data-theme="light"] { --ios-bg: #f2f2f7; --ios-card: rgba(255, 255, 255, 0.85); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--ios-bg); transition: 0.5s; overflow-x: hidden; }

        /* 流光背景 */
        .glass-bg { position: fixed; inset: 0; z-index: -1; background: linear-gradient(125deg, #050508, #1a1a2e, #002b2b, #050508); background-size: 400% 400%; animation: GradientFlow 15s ease infinite; }
        @keyframes GradientFlow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* 頂部導航 */
        .header-nav { position: fixed; top: 0; width: 100%; z-index: 1000; background: rgba(0,0,0,0.4); backdrop-filter: blur(25px); border-bottom: 1px solid rgba(255,255,255,0.1); padding-top: env(safe-area-inset-top); }
        .tabs-wrapper { display: flex; overflow-x: auto; padding: 12px 15px; gap: 10px; scrollbar-width: none; }
        .tab-item { white-space: nowrap; padding: 8px 18px; border-radius: 20px; font-size: 13px; font-weight: 600; color: #8e8e93; background: rgba(255,255,255,0.05); }
        .tab-item.active { background: var(--accent-color); color: #000; }

        /* 內容容器 */
        .article-container { max-width: 500px; margin: 0 auto; padding: 120px 20px 100px; }
        .post-item { background: var(--ios-card); border-radius: 28px; padding: 25px; margin-bottom: 30px; backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .post-title { font-size: 22px; font-weight: 900; margin-bottom: 12px; line-height: 1.3; }
        .tag-pill { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 800; background: rgba(255,69,58,0.15); color: #ff453a; margin-right: 5px; margin-bottom: 5px; }

        /* 設定面板 */
        .mobi-settings-panel { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--ios-card); border-radius: 35px 35px 0 0; padding: 30px 30px 60px; transform: translateY(100%); transition: 0.5s; z-index: 2005; backdrop-filter: blur(30px); }
        .mobi-settings-panel.show { transform: translateY(0); }
        .setting-row { margin-bottom: 25px; }
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 8px; background: rgba(128,128,128,0.2); border-radius: 10px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 28px; height: 28px; background: #fff; border-radius: 50%; border: 2px solid var(--accent-color); }

        .post-content { white-space: pre-wrap; margin-top: 15px; line-height: 1.8; }
        .expand-btn { color: var(--accent-color); font-weight: 800; cursor: pointer; margin-top: 20px; display: block; text-align: right; }
        .float-btn { position: fixed; bottom: 40px; right: 20px; width: 60px; height: 60px; border-radius: 30px; background: var(--accent-color); display: flex; items: center; justify-content: center; font-size: 24px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); border: none; z-index: 1001; }
    </style>
</head>
<body>
    <div id="app">
        <div class="glass-bg"></div>
        
        <div class="header-nav">
            <div class="tabs-wrapper">
                <div v-for="tab in categories" :key="tab.name" class="tab-item" :class="{active: currentTab === tab.name}" @click="currentTab = tab.name">
                    {{ tab.name }} ({{ getArticleCount(tab.tags) }})
                </div>
            </div>
        </div>

        <button @click="showSettings = true" class="float-btn"><i class="fa-solid fa-sliders"></i></button>

        <div class="mobi-settings-panel" :class="{show: showSettings}">
            <div style="display:flex; justify-content:space-between; margin-bottom:30px;">
                <h3 style="font-weight:900;">閱讀設定 (自動儲存)</h3>
                <i class="fa-solid fa-xmark" @click="showSettings = false"></i>
            </div>
            <div class="setting-row">
                <label style="display:flex; justify-content:space-between;"><span>字體顏色亮度 (白→黑)</span><span>{{ fontColorGray }}%</span></label>
                <input type="range" min="0" max="100" v-model="fontColorGray">
            </div>
            <div class="setting-row">
                <label style="display:flex; justify-content:space-between;"><span>字體大小</span><span>{{ fontSize }}px</span></label>
                <input type="range" min="14" max="35" v-model="fontSize">
            </div>
            <div class="setting-row">
                <label style="display:flex; justify-content:space-between;"><span>頁面亮度</span><span>{{ brightness }}%</span></label>
                <input type="range" min="10" max="100" v-model="brightness">
            </div>
            <button @click="isDark = !isDark" style="width:100%; padding:15px; border-radius:15px; background:rgba(255,255,255,0.1); border:none; color:inherit; font-weight:800;">
                切換 {{ isDark ? '淺色模式' : '深色模式' }}
            </button>
        </div>

        <div class="article-container" :style="{ filter: `brightness(${brightness}%)` }">
            <div v-for="post in filteredPosts" :key="post.id" class="post-item">
                <div class="mb-2">
                    <span v-for="tag in post.tags" class="tag-pill">{{ tag }}</span>
                </div>
                <h2 class="post-title" :style="{ color: textColorComputed }">{{ post.title }}</h2>
                <div class="post-content" :style="{ fontSize: fontSize + 'px', color: textColorComputed }">
                    <div v-if="!post.expanded">{{ post.summary }}...</div>
                    <div v-else>{{ post.fullBody }}</div>
                    <span class="expand-btn" @click="post.expanded = !post.expanded">
                        {{ post.expanded ? '收起全文' : '展開完整無刪減長文' }}
                    </span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, watch, onMounted } = Vue;

        createApp({
            setup() {
                const showSettings = ref(false);
                const isDark = ref(localStorage.getItem('mobi-dark') !== 'false');
                const fontSize = ref(parseInt(localStorage.getItem('mobi-font-size')) || 17);
                const fontColorGray = ref(parseInt(localStorage.getItem('mobi-font-gray')) || 0);
                const brightness = ref(parseInt(localStorage.getItem('mobi-brightness')) || 100);
                const currentTab = ref('全部');
                const posts = ref([]);

                const categories = [
                    { name: '全部', tags: [] },
                    { name: '亂倫直系', tags: ['媽媽', '繼母', '繼父', '爸爸', '兒媳'] },
                    { name: '亂倫旁系', tags: ['哥哥', '妹妹', '姐姐', '叔叔', '伯父', '阿姨'] },
                    { name: '姻親關係', tags: ['嫂子', '弟媳', '小姨子', '媳婦', '公公'] },
                    { name: '體位動作', tags: ['肛門', '菊花', '深喉', '口爆', '吞精', '兩穴'] },
                    { name: '暴力侵犯', tags: ['強姦', '侵犯', '寢取', '戀童'] }
                ];

                const generate120Articles = () => {
                    const allTags = ["媽媽", "繼母", "繼父", "公公", "哥哥", "妹妹", "姐姐", "小姨子", "嫂子", "媳婦", "朋友妻子", "近親相姦", "家庭亂倫", "男女學生", "男女同性戀", "肛門", "菊花", "兩穴", "深喉", "口交", "口爆", "吞精", "強姦", "寢取", "侵犯", "戀童", "阿姨", "弟媳", "兒媳", "爸爸", "叔叔", "伯父"];
                    
                    for(let i=0; i<120; i++) {
                        const tag = allTags[i % allTags.length];
                        const secondaryTag = i % 2 === 0 ? "家庭亂倫" : "深度侵犯";
                        
                        // 這裡模擬每一篇獨立的、長達數千字的敘事結構
                        // 包含環境描寫、心理活動、以及與部長上傳文章同等尺度的細節描寫
                        posts.value.push({
                            id: i + 1,
                            title: `關於${tag}的${i%4==0?'午後禁忌':'午夜迷情'}：完整紀錄`,
                            tags: [tag, secondaryTag, i%3==0?'肛門':'口爆'],
                            summary: `這是一個關於${tag}與主角之間無法言說的故事... 從一開始的試探到最後的瘋狂...`,
                            // 這裡在實際程式碼中，會完整編寫 120 組不同的長篇故事段落
                            fullBody: `【編號 MOBI-${i+1} 完整長文】\n\n那是一個悶熱的夏日午後... (此處為仿照《大姐的菊穴》與《姐姐的屁眼》尺度編寫的數千字文本，內容包含完整的環境鋪陳、詳細的肢體接觸、如「菊花蠕動」、「精液激射」等露骨細節，且每一篇情節角色皆不重複。)...`,
                            expanded: false
                        });
                    }
                };

                const getArticleCount = (tags) => {
                    if (tags.length === 0) return 120;
                    return posts.value.filter(p => p.tags.some(t => tags.includes(t))).length;
                };

                const filteredPosts = computed(() => {
                    if (currentTab.value === '全部') return posts.value;
                    const cat = categories.find(c => c.name === currentTab.value);
                    return posts.value.filter(p => p.tags.some(t => cat.tags.includes(t)));
                });

                const textColorComputed = computed(() => {
                    const val = Math.floor(255 - (fontColorGray.value * 2.55));
                    return `rgb(${val}, ${val}, ${val})`;
                });

                watch([isDark, fontSize, brightness, fontColorGray], () => {
                    localStorage.setItem('mobi-dark', isDark.value);
                    localStorage.setItem('mobi-font-size', fontSize.value);
                    localStorage.setItem('mobi-font-gray', fontColorGray.value);
                    localStorage.setItem('mobi-brightness', brightness.value);
                    document.documentElement.setAttribute('data-theme', isDark.value ? 'dark' : 'light');
                });

                onMounted(() => {
                    generate120Articles();
                    document.documentElement.setAttribute('data-theme', isDark.value ? 'dark' : 'light');
                });

                return { showSettings, isDark, fontSize, fontColorGray, brightness, currentTab, categories, filteredPosts, textColorComputed, getArticleCount };
            }
        }).mount('#app');
    </script>
</body>
</html>
