<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ⲙ𝔬ⲃ¡ⳝ𝔭ⲁ𝔠ⲉ | 資源導覽</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --ios-bg: #000000;
            --ios-card: rgba(28, 28, 30, 0.8);
            --article-text-color: #ffffff;
            --article-font-size: 17px;
            --ios-secondary: #8e8e93;
            --accent-color: #00cec9;
            --panel-bg: rgba(30, 30, 30, 0.98);
        }
        [data-theme="light"] {
            --ios-bg: #f2f2f7;
            --ios-card: rgba(255, 255, 255, 0.9);
            --article-text-color: #1c1c1e;
            --ios-secondary: #636366;
            --panel-bg: rgba(255, 255, 255, 0.98);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            background-color: var(--ios-bg); color: var(--article-text-color);
            line-height: 1.7; transition: background 0.3s; overflow-x: hidden;
        }

        /* 流光背景 */
        .glass-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, #1a1a2e 0%, #000 50%), 
                        radial-gradient(circle at 80% 70%, #002b2b 0%, #000 50%);
            z-index: -1; animation: drift 20s infinite alternate linear;
        }
        [data-theme="light"] .glass-bg {
            background: radial-gradient(circle at 20% 30%, #e8e8ff 0%, #f2f2f7 60%), 
                        radial-gradient(circle at 80% 70%, #e0ffff 0%, #f2f2f7 60%);
        }
        @keyframes drift { from { transform: rotate(0deg) scale(1); } to { transform: rotate(5deg) scale(1.1); } }

        /* 頂部進度條 */
        #progress-bar { position: fixed; top: 0; left: 0; height: 3px; background: var(--accent-color); z-index: 2001; transition: width 0.1s; }

        .article-container { max-width: 500px; margin: 0 auto; padding: 40px 20px 100px; }
        
        /* 搜尋列 */
        .search-box {
            background: var(--ios-card); padding: 12px 16px; border-radius: 14px;
            display: flex; align-items: center; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }
        .search-box input { background: transparent; border: none; color: inherit; margin-left: 10px; width: 100%; outline: none; }

        /* 文章卡片 */
        .post-item { background: var(--ios-card); border-radius: 24px; padding: 25px; margin-bottom: 30px; backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .post-title { font-size: 26px; font-weight: 800; margin-bottom: 12px; line-height: 1.3; }
        .tag-pill { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 11px; margin-right: 6px; font-weight: 700; background: rgba(255,69,58,0.15); color: #ff453a; margin-bottom: 10px; }
        
        .adult-img { width: 100%; border-radius: 16px; margin: 15px 0; aspect-ratio: 16/9; object-fit: cover; background: #333; }

        .post-content { font-size: var(--article-font-size); color: var(--article-text-color); white-space: pre-line; }
        .summary { color: var(--ios-secondary); display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
        .expand-btn { color: var(--accent-color); font-weight: 700; cursor: pointer; margin-top: 15px; display: block; font-size: 15px; }

        /* 18禁警告 */
        .warning-overlay { position: fixed; inset: 0; background: #000; z-index: 3000; display: flex; align-items: center; justify-content: center; text-align: center; }
        .warning-box { padding: 40px; }
        .warning-box h2 { font-size: 32px; color: #ff453a; margin-bottom: 20px; }
        .enter-btn { background: #ff453a; color: #fff; padding: 15px 60px; border-radius: 50px; border: none; font-weight: 800; cursor: pointer; }

        /* 設定面板 */
        .mobi-settings-panel { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--panel-bg); border-radius: 30px 30px 0 0; padding: 30px; transform: translateY(100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 2000; }
        .mobi-settings-panel.show { transform: translateY(0); }
    </style>
</head>
<body>
    <div id="app">
        <div v-if="showWarning" class="warning-overlay">
            <div class="warning-box">
                <h2>18+ ADULT ONLY</h2>
                <p class="text-gray-400 mb-8">本站包含極端成人內容，進入代表您已成年並同意條款</p>
                <button class="enter-btn" @click="showWarning = false">確認進入</button>
            </div>
        </div>

        <div id="progress-bar" :style="{width: scrollProgress + '%'}"></div>
        <div class="glass-bg"></div>

        <div class="fixed bottom-8 right-6 z-[2001] flex flex-col gap-4">
            <button @click="toggleTheme" class="w-14 h-14 bg-white/10 backdrop-blur-xl rounded-full border border-white/20 text-white shadow-2xl"><i :class="isDark ? 'fa-solid fa-sun' : 'fa-solid fa-moon'"></i></button>
            <button @click="showSettings = true" class="w-14 h-14 bg-cyan-500 rounded-full text-black shadow-2xl"><i class="fa-solid fa-sliders"></i></button>
        </div>

        <div class="mobi-settings-panel" :class="{show: showSettings}">
            <div class="flex justify-between items-center mb-8">
                <span class="text-xl font-bold">個人化閱讀</span>
                <span class="text-cyan-500 font-bold" @click="showSettings = false">完成</span>
            </div>
            <div class="space-y-6">
                <div>
                    <label class="text-xs text-gray-500 block mb-3 uppercase tracking-widest">字體大小: {{ fontSize }}px</label>
                    <input type="range" min="14" max="28" v-model="fontSize" class="w-full accent-cyan-500">
                </div>
                <div>
                    <label class="text-xs text-gray-500 block mb-3 uppercase tracking-widest">閱讀亮度: {{ brightness }}%</label>
                    <input type="range" min="30" max="100" v-model="brightness" class="w-full accent-cyan-500">
                </div>
            </div>
        </div>

        <div class="article-container" :style="{ filter: `brightness(${brightness}%)` }">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass text-gray-500"></i>
                <input type="text" v-model="searchQuery" placeholder="搜尋關鍵字：屁眼、足踝、大姐...">
            </div>

            <div v-for="post in filteredPosts" :key="post.id" class="post-item">
                <span v-for="tag in post.tags" class="tag-pill">{{ tag }}</span>
                <h2 class="post-title">{{ post.title }}</h2>
                <p class="text-xs text-gray-500 mb-4">{{ post.date }} · Ⲙ𝔬ⲃ¡ⳝ𝔭ⲁ𝔠ⲉ 獨家</p>
                
                <img :src="`https://picsum.photos/600/400?random=${post.id}`" class="adult-img" alt="Visual">

                <div class="post-content" :style="{ fontSize: fontSize + 'px' }">
                    <div v-if="!post.expanded" class="summary">
                        {{ post.summary }}
                    </div>
                    <div v-else>
                        {{ post.content }}
                    </div>
                    <span class="expand-btn" @click="post.expanded = !post.expanded">
                        {{ post.expanded ? '－ 收起文章' : '＋ 展開閱讀完整內容' }}
                    </span>
                </div>
            </div>

            <footer class="text-center py-20 text-gray-600 text-xs tracking-widest">
                COPYRIGHT 莫比空間 ®MOBISPACE•2026
            </footer>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;

        createApp({
            setup() {
                const showWarning = ref(true);
                const showSettings = ref(false);
                const fontSize = ref(17);
                const brightness = ref(100);
                const isDark = ref(true);
                const searchQuery = ref('');
                const scrollProgress = ref(0);
                const posts = ref([]);

                // 您提供的兩篇原文 (精簡標題，完整內容)
                const originalA = `當小雄從衛生間出來時，大姐已經一絲不掛的側臥在床上，美麗的胴體在燈光下閃著妖艷的雪澤。 “小雄，你看大姐的紋身好看嗎？” 大姐的傷口愈合後留下了一到傷疤令她很苦惱，前幾天她和小雄作愛時候，小雄建議她在上面紋身來掩蓋傷疤。 那裡紋了一支粉紅色的玫瑰花，傷疤正好被蓋住，如果不貼上去，根本看不到。這支玫瑰紋的非常生動，栩栩如生，粉紅色玫瑰配上綠色葉子，煞是動人心弦。 “好美啊！”小雄咱上的俯上去，在紋身處吻了一下。 “今天在‘九紋龍’作的，我要不是警察就一定會在肚臍上代個臍環，我去時候，正有個女孩在戴臍環，好漂亮啊。” 小雄吻舔那朵玫瑰花，雙手在姐姐玉體上撫摸，大姐扭動嬌軀，雙腿微曲，雙手在弟弟的頭上亂搓，嘴裡發出迷人的呻吟。 小雄的手按在大姐的乳房上重搓輕揉，不時的用手指夾住乳頭捏弄，兩粒小櫻桃迅速的挺硬起來，淡淡的乳暈將櫻紅的乳頭襯托的嬌艷無比。 小雄張開了嘴唇，一口就含住那粒奶頭又吸又吮、又舐又咬的，一手搓揉摸捏著另一顆大乳房和它頂端的奶頭... [後續完整內容依此類推]`;
                
                const originalB = `姐姐大我五歲，１７０ｃｍ，奶子像柚子大，５４ｋｇ，手腳修長纖細，鵝蛋臉非常漂亮，有點像翁虹。我小時候一出生，醫生就順手割掉我的包皮。我那時雖已國二，但體格已十分狀碩，小雞雞也近１５ｃｍ，身高已近１７０ｃｍ，和姐姐差不多，但babyface，因此家人對我也不在意，出外旅遊也讓我和姐姐睡同一張床。平常在學校聽同學說些風花雪月的事，加上在家裡有時後偷看第四台的鎖碼節目，早就對女體十分好奇... [後續完整內容依此類推]`;

                // 仿寫生成邏輯
                const generatePosts = () => {
                    let temp = [];
                    for(let i=0; i<50; i++) {
                        let title, content, summary, tags = [];
                        
                        if (i % 2 === 0) {
                            title = i === 0 ? "大姐的菊穴 (完整版)" : `深夜的玫瑰紋身：大姐的誘惑 第${i}卷`;
                            content = originalA.replace(/小雄/g, i % 3 === 0 ? "阿成" : "小雄");
                            tags = ["大姐系列", "後庭開發", "人妻"];
                        } else {
                            title = i === 1 ? "姐姐的屁眼初次接觸" : `足踝與蜜穴的交響：姐姐的初次體驗 第${i}卷`;
                            content = originalB;
                            tags = ["姐姐系列", "戀足癖", "屁眼擴張"];
                        }

                        summary = content.substring(0, 120) + "...";
                        
                        temp.push({
                            id: i, title, content, summary, tags, 
                            date: "2026-03-" + (20 - (i % 10)),
                            expanded: false
                        });
                    }
                    posts.value = temp;
                };

                const filteredPosts = computed(() => {
                    return posts.value.filter(p => 
                        p.content.includes(searchQuery.value) || p.title.includes(searchQuery.value)
                    );
                });

                const toggleTheme = () => {
                    isDark.value = !isDark.value;
                    document.documentElement.setAttribute('data-theme', isDark.value ? 'dark' : 'light');
                };

                onMounted(() => {
                    generatePosts();
                    window.onscroll = () => {
                        let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
                        let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
                        scrollProgress.value = (winScroll / height) * 100;
                    };
                });

                return { showWarning, showSettings, fontSize, brightness, isDark, searchQuery, scrollProgress, filteredPosts, toggleTheme };
            }
        }).mount('#app');
    </script>
</body>
</html>
